@if (compact()) {
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div
        class="rounded d-flex flex-column flex-lg-row align-items-lg-center bg-body min-h-75px"
    >
      <div class="row flex-grow-1 mb-5 mb-lg-0">
        <div class="col-lg-12 d-flex align-items-center mb-5 mb-lg-0">
          <i class="ki-duotone ki-magnifier fs-1 text-gray-500 me-1">
            <span class="path1"></span>
            <span class="path2"></span>
          </i>
          <div
              [hideIsOptional]="true"
              [hideBorder]="true"
              [id]="'user'"
              [isInputGroupSpan]="true"
              [placeholder]="'¿Cuál especialidad buscas?'"
              [typeaheadOptionField]="'name'"
              class="col"
              [isTypeaheadAsync]="false"
              formControlName="specialty"
              [typeaheadOptions]="specialties"
              [adaptivePosition]="false"
              (onBlur)="onSpecialtyTypeaheadSelect($event)"
              controlTypeahead
          ></div>
        </div>
        <div class="col-lg-12 d-flex align-items-center">
          <i class="ki-duotone ki-geolocation fs-1 text-gray-500 me-1">
            <span class="path1"></span>
            <span class="path2"></span>
          </i>
          <div
              [hideIsOptional]="true"
              [hideBorder]="true"
              [id]="'user'"
              [isInputGroupSpan]="true"
              [placeholder]="'Ubicación'"
              [typeaheadOptionField]="'name'"
              (onSelect)="onTypeaheadSelect($event)"
              (onBlur)="onLocationTypeaheadBlur($event)"
              class="col"
              formControlName="location"
              [typeaheadOptions]="autocompleteResults"
              [adaptivePosition]="false"
              controlTypeahead
          ></div>
        </div>
      </div>
      <div class="text-end">
        <button
          type="submit"
          class="btn btn-success"
          id="kt_advanced_search_button_1"
        >
          <i class="ki-duotone ki-magnifier fs-1 text-white">
            <span class="path1"></span>
            <span class="path2"></span>
          </i>
        </button>
      </div>
    </div>
  </form>
} @else {
  <div
    class="card mb-lg-9 mb-5 bgi-no-repeat bgi-position-y-top bgi-size-cover card-bg shadow-none" style="background-color: #0AA0F3; border: none;"
  >
    <div class="card-body d-flex flex-column flex-center py-10 py-lg-20 min-h-">
      <div class="text-center mb-12">
        <h3 class="fw-bolder fs-2x text-white pb-1">{{specialistsQuantity}} Especialistas</h3>
        <span class="fw-semibold fs-4 text-white"
          >Encuentra al especialista ideal para tu bienestar</span
        >
      </div>
      <div class="w-xxl-850px d-flex flex-column">
          <form [formGroup]="form" (ngSubmit)="onSubmit()">
            <div
                class="rounded d-flex flex-column flex-lg-row align-items-lg-center bg-body p-5 min-h-75px"
            >
              <div class="row flex-grow-1 mb-5 mb-lg-0">
                <div class="col-lg-6 d-flex align-items-center mb-5 mb-lg-0">
                  <i class="ki-duotone ki-magnifier fs-1 text-gray-500 me-1">
                    <span class="path1"></span>
                    <span class="path2"></span>
                  </i>
                  <div
                      [hideIsOptional]="true"
                      [hideBorder]="true"
                      [id]="'user'"
                      [isInputGroupSpan]="true"
                      [placeholder]="'¿Cuál especialidad buscas?'"
                      [typeaheadOptionField]="'name'"
                      class="col"
                      [isTypeaheadAsync]="false"
                      formControlName="specialty"
                      [typeaheadOptions]="specialties"
                      (onBlur)="onSpecialtyTypeaheadSelect($event)"
                      controlTypeahead
                  ></div>
                </div>
                <div class="col-lg-6 d-flex align-items-center">
                  <div
                    class="bullet bg-secondary d-none d-lg-block h-30px w-2px me-5"
                  ></div>
                  <i class="ki-duotone ki-geolocation fs-1 text-gray-500 me-3">
                    <span class="path1"></span>
                    <span class="path2"></span>
                  </i>
                  <div
                      [hideIsOptional]="true"
                      [hideBorder]="true"
                      [id]="'user'"
                      [isInputGroupSpan]="true"
                      [placeholder]="'Ubicación'"
                      [typeaheadOptionField]="'name'"
                      (onSelect)="onTypeaheadSelect($event)"
                      (onBlur)="onLocationTypeaheadBlur($event)"
                      class="col"
                      formControlName="location"
                      [typeaheadOptions]="autocompleteResults"
                      controlTypeahead
                  ></div>
                </div>
              </div>
              <div class="min-w-150px text-end">
                <button
                  type="submit"
                  class="btn btn-success"
                  id="kt_advanced_search_button_1"
                >
                  Buscar
                </button>
              </div>
            </div>
          </form>
      </div>
    </div>
  </div>
}
