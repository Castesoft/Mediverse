<form (ngSubmit)="onSubmit()">
  <div class="rounded d-flex flex-column flex-lg-row align-items-center bg-body">
    <div class="d-flex align-items-center position-relative"
         [ngClass]="compact() ? 'col-6 pe-2' : 'col-lg-5 ms-lg-3'">
      <i class="ki-duotone ki-magnifier fs-1 text-gray-500 inset-icon">
        <span class="path1"></span>
        <span class="path2"></span>
      </i>
      <div controlTypeahead3
           [(fromWrapper)]="fromWrapper"
           [(control)]="form.controls.specialty"
           [useIcon]="true"
           class="w-100">
      </div>
    </div>

    <div class="d-flex align-items-center position-relative"
         [ngClass]="compact() ? 'col-6 ps-2' : 'col-lg-5 ms-lg-3'">
      <i class="ki-duotone ki-geolocation fs-1 text-gray-500 inset-icon">
        <span class="path1"></span>
        <span class="path2"></span>
      </i>
      <div controlTypeahead3
           [(fromWrapper)]="fromWrapper"
           [(control)]="form.controls.location"
           [useIcon]="true"
           class="w-100 input-with-icon">
      </div>
    </div>

    @if (!compact()) {
      <div class="text-end col-lg-auto mt-3 mt-lg-0 ms-lg-3">
        <button type="submit"
                class="btn btn-success"
                [disabled]="form.disabled">
          <i class="ki-duotone ki-magnifier fs-1 text-white">
            <span class="path1"></span>
            <span class="path2"></span>
          </i>
          Buscar
        </button>
      </div>
    }
  </div>

  @if (compact()) {
    <div class="mt-3">
      <button type="submit"
              class="btn btn-primary w-100"
              [disabled]="form.disabled">
        <i class="ki-duotone ki-magnifier fs-1 text-white">
          <span class="path1"></span>
          <span class="path2"></span>
        </i>
        Buscar
      </button>
    </div>
  }
</form>
