<!-- <code class="json">{{service.search() | json}}</code> -->

<form (ngSubmit)="onSubmit()">
@if (compact()) {
  <div
    class="rounded d-flex flex-lg-row align-items-lg-center bg-body min-h-75px p-2"
  >
    <div class="row flex-grow-1 mb-lg-0">
      <div class="col-lg-12 d-flex align-items-center mb-lg-0">
        <i class="ki-duotone ki-magnifier fs-1 text-gray-500 me-1">
          <span class="path1"></span>
          <span class="path2"></span>
        </i>
        <div controlTypeahead3 [(control)]="form.controls.specialty" class="col"></div>
      </div>
      <div class="col-lg-12 d-flex align-items-center">
        <i class="ki-duotone ki-geolocation fs-1 text-gray-500 me-1">
          <span class="path1"></span>
          <span class="path2"></span>
        </i>
        <div [(control)]="form.controls.location" controlTypeahead3 class="col"></div>
      </div>
    </div>
    <div class="text-end align-self-center">
      <button
        type="submit"
        class="btn btn-success"
        id="kt_advanced_search_button_1"
        [disabled]="form.disabled"
      >
        <i class="ki-duotone ki-magnifier fs-1 text-white">
          <span class="path1"></span>
          <span class="path2"></span>
        </i>
      </button>
    </div>
  </div>
} @else {
  <div
    class="rounded d-flex flex-column flex-lg-row align-items-lg-center bg-body p-5 min-h-75px"
  >
    <div class="row flex-grow-1 mb-5 mb-lg-0">
      <div class="col-lg-6 d-flex align-items-center mb-5 mb-lg-0">
        <i class="ki-duotone ki-magnifier fs-1 text-gray-500 me-1">
          <span class="path1"></span>
          <span class="path2"></span>
        </i>
        <div controlTypeahead3 [(control)]="form.controls.specialty" class="col"></div>
      </div>
      <div class="col-lg-6 d-flex align-items-center">
        <div
          class="bullet bg-secondary d-none d-lg-block h-30px w-2px me-5"
        ></div>
        <i class="ki-duotone ki-geolocation fs-1 text-gray-500 me-3">
          <span class="path1"></span>
          <span class="path2"></span>
        </i>
        <div controlTypeahead3 [(control)]="form.controls.location" class="col"></div>
      </div>
    </div>
    <div class="min-w-150px text-end">
      <button
        type="submit"
        class="btn btn-success"
        [attr.form]="form.id"
      >
        Buscar
      </button>
    </div>
  </div>
}
</form>
