@let pagination = service.pagination();

@if (!service.loading()) {
  <div class="container">
    <h1 class="text-gray-800 fw-bold my-3 text-center">
      <a routerLink="/">Mediverse</a>
    </h1>
    <div class="py-3" searchForm [compact]="true"></div>

    <!-- <div style="max-height: 100px; overflow: auto; min-height: 100px;" class="border border-2 rounded-3 border-gray-700">
      <strong>Search: </strong><code>
        {{service.search() | json}}
      </code>
    </div>
    <div style="max-height: 100px; overflow: auto; min-height: 100px;" class="border border-2 rounded-3 border-gray-700">
      <strong>Seleccionado: </strong><code>
        {{service.selected() | json}}
      </code>
    </div>
    <div style="max-height: 100px; overflow: auto; min-height: 100px;" class="border border-2 rounded-3 border-gray-700">
      <strong>Params: </strong><code>
        {{service.search().params | json}}
      </code>
    </div> -->

    <div searchResultCounter></div>

  </div>

  @if (service.results() && service.results()?.doctors!.length > 0) {
  <div class="overflow-y-auto" style="flex: 1;">
    @for (doctor of service.results()?.doctors; let idx = $index; track idx) {
    <div resultRow [(doctor)]="service.results()!.doctors[idx]"></div>
    <div class="separator separator-dashed"></div>
    }
  </div>
  <div class="d-flex flex-center pb-6 container">
    @if (pagination !== null) {
    <!-- <div tablePager [currentPage]="service.pagination()!.currentPage" [(params)]="params"
      [itemsPerPage]="service.pagination()!.itemsPerPage" [totalItems]="service.pagination()!.totalItems"
      (pageChanged)="service.onPageChanged($event)" [hideShowAll]="true" [hideShowing]="true" [isCompact]="false"></div> -->
    <div tablePager [pagination]="pagination" [(params)]="service.search" (paramsChange)="service.getSearchResults().subscribe()" [hideShowAll]="true" [hideShowing]="true" [isCompact]="false"></div>
    }
  </div>
  } @else {
  <div noResultScreen></div>
  }
  } @else {
  <div loadingPlaceholder></div>
  }
