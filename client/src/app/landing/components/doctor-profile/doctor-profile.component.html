@if (doctor) {
<div class="container mt-5" style="padding-top: 100px;">
  <div class="row">
    <div class="col-md-4">
      <div class="card">
        <div class="card-body text-center">
          <app-user-profile-picture
            [firstName]="doctor!.firstName"
            [photoUrl]="doctor!.photoUrl"
            size="lg"
          ></app-user-profile-picture>
          <h2 class="mt-3">
            {{ doctor!.firstName }} {{ doctor!.lastName }}
          </h2>
          <p class="text-muted">{{ doctor!.specialties[0].name }}</p>
          <div class="d-flex align-items-center justify-content-center gap-2 mt-2">
            <i class="ki-duotone ki-sms fs-2">
              <span class="path1"></span>
              <span class="path2"></span>
            </i>
            <a class="text-muted text-hover-primary">{{ doctor!.email }}</a>
          </div>
          <div class="d-flex align-items-center justify-content-center gap-2 mt-2">
            <i class="ki-duotone ki-phone fs-2">
              <span class="path1"></span>
              <span class="path2"></span>
            </i>
            <a class="text-muted text-hover-primary">{{ doctor!.phoneNumber }}</a>
          </div>
          <div class="d-flex justify-content-center gap-2 mt-3">
            <button class="btn btn-primary d-flex align-items-center" (click)="selectTab('schedule')">
              <i class="ki-duotone ki-calendar-add fs-2 me-2">
                <span class="path1"></span>
                <span class="path2"></span>
                <span class="path3"></span>
                <span class="path4"></span>
                <span class="path5"></span>
                <span class="path6"></span>
              </i>
              Agendar Cita
            </button>
            <button class="btn btn-outline-primary d-flex align-items-center" (click)="openShareModal()">
              <i class="ki-duotone ki-share fs-2 me-2">
                <span class="path1"></span>
                <span class="path2"></span>
                <span class="path3"></span>
                <span class="path4"></span>
                <span class="path5"></span>
                <span class="path6"></span>
              </i>
              Compartir
            </button>
          </div>
        </div>
      </div>
    </div>
    <div class="col-md-8">
      <ul class="nav nav-custom nav-tabs nav-line-tabs nav-line-tabs-2x fs-6 fw-semibold mt-6 mb-3 gap-2">
        <li class="nav-item" style="cursor: pointer;">
          <a class="nav-link text-active-primary d-flex align-items-center pb-4" [class.active]="activeTab === 'general'" (click)="selectTab('general')">
            <i class="ki-duotone ki-home fs-4 me-1"></i>Información General
          </a>
        </li>
        <li class="nav-item" style="cursor: pointer;">
          <a class="nav-link text-active-primary d-flex align-items-center pb-4" [class.active]="activeTab === 'reviews'" (click)="selectTab('reviews')">
            <i class="ki-duotone ki-save-2 fs-4 me-1">
              <span class="path1"></span>
              <span class="path2"></span>
            </i>Reseñas
          </a>
        </li>
        <li class="nav-item" style="cursor: pointer;">
          <a class="nav-link text-active-primary d-flex align-items-center pb-4" [class.active]="activeTab === 'schedule'" (click)="selectTab('schedule')">
            <i class="ki-duotone ki-calendar-8 fs-4 me-1">
              <span class="path1"></span>
              <span class="path2"></span>
              <span class="path3"></span>
              <span class="path4"></span>
              <span class="path5"></span>
              <span class="path6"></span>
            </i>Horarios
          </a>
        </li>
      </ul>

      <div class="tab-content mt-3">
        <div [hidden]="activeTab !== 'general'">
          <app-doctor-general-tab [doctor]="doctor!"></app-doctor-general-tab>
        </div>
        <div [hidden]="activeTab !== 'reviews'">
          <app-doctor-reviews-tab
            [reviews]="doctor!.reviews"
          ></app-doctor-reviews-tab>
        </div>
        <div [hidden]="activeTab !== 'schedule'" class="row">
          <div class="col-md-6">
            <app-doctor-schedule-tab
              [doctor]="doctor!"
              (onSelectSchedule)="selectSchedule($event)"
            ></app-doctor-schedule-tab>
          </div>
          <div class="col-md-6">
            @if (isScheduling) {
                <app-doctor-schedule
                    [doctor]="doctor!"
                    [selectedSchedule]="selectedSchedule"
                    (onClose)="onCloseDoctorSchedule($event)"
                ></app-doctor-schedule>
            }
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

}
