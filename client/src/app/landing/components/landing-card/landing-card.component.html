<div class="landing-card-container albert-sans bg-white">
  <div class="landing-card-image-header"
       [ngClass]="'landing-card-bg-' + colorClass() + (altBackground() ? '-alt' : '')">
  </div>
  <div class="landing-card-body px-8 d-flex flex-column align-items-start justify-content-center">
    <div class="landing-card-title fw-bolder mb-6" [ngClass]="'text-' + colorClass()">
      {{ title() }}
    </div>
    <div class="fw-light">
      {{ text() }}
    </div>
  </div>
</div>
