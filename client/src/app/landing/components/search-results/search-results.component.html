<div searchAuth></div>

<div doctorResultsWindow></div>

@if (service.selected() !== null) {
  <div doctorDetailWindow [startingTab]="startingTab" (onClose)="service.close()" (onEventCreated)="onEventCreated()"
    [(selectedSchedule)]="selectedSchedule" [(selectedTime)]="selectedTime" [(scheduleWindowOpen)]="scheduleWindowOpen"></div>
}
@if (scheduleWindowOpen()) {
  <div doctorScheduleWindow [(isMobile)]="isMobile" [(selectedTime)]="selectedTime"
    [(selectedSchedule)]="selectedSchedule" [(scheduleWindowOpen)]="scheduleWindowOpen"></div>
  <!-- <div [class]="!isMobile() ? 'schedule-modal' : 'schedule-modal-mobile'">
  </div> -->
  }

@if (isMobile() && !showMobileSearch()) {
<div id="search-mobile" class="position-absolute top-0 p-4" style="z-index: 1;">
  <h1 class="text-gray-800 fw-bold my-3 text-center">
    <a routerLink="/">Mediverse</a>
  </h1>
  <div class="py-3">
    <div searchForm [compact]="true"></div>
  </div>
</div>
}
