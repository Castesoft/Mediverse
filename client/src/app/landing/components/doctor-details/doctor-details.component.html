<div class="card card-flush h-lg-100" [style]="isMobile() ? { width: '100%' } : { width: '420px' }" id="kt_contacts_main">
    <div class="card-header pt-7" id="kt_chat_contacts_header">
        <div class="card-title">
            <i class="ki-duotone ki-badge fs-1 me-2">
                <span class="path1"></span>
                <span class="path2"></span>
                <span class="path3"></span>
                <span class="path4"></span>
                <span class="path5"></span>
            </i>
            <h2>Detalles del Especialista</h2>
        </div>
        <div class="card-toolbar gap-3">
            <i class="ki-duotone ki-cross fs-2" (click)="onClose.emit()" style="cursor: pointer;">
                <span class="path1"></span>
                <span class="path2"></span>
                <span class="path3"></span>
            </i>
        </div>
    </div>
    <div class="card-body pt-5 d-flex flex-column overflow-y-scroll">
        <div class="d-flex gap-3 align-items-center">
            <app-user-profile-picture
              [account]="$any(doctor())"
                size="md"
            ></app-user-profile-picture>
            <div class="d-flex flex-column gap-2">
                <h3 (click)="navigateToDoctorProfile()" style="cursor: pointer;" class="mb-0 text-hover-primary">{{doctor()?.firstName}} {{doctor()?.lastName}}</h3>
                <div class="d-flex align-items-center gap-2">
                    <i class="ki-duotone ki-sms fs-2">
                        <span class="path1"></span>
                        <span class="path2"></span>
                    </i>
                    <a class="text-muted text-hover-primary">{{doctor()?.email}}</a>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <i class="ki-duotone ki-phone fs-2">
                        <span class="path1"></span>
                        <span class="path2"></span>
                    </i>
                    <a class="text-muted text-hover-primary">{{doctor()?.phoneNumber}}</a>
                </div>
            </div>
        </div>
        <ul class="nav nav-custom nav-tabs nav-line-tabs nav-line-tabs-2x fs-6 fw-semibold mt-6 mb-3 gap-2">
            <li class="nav-item" style="cursor: pointer;">
                <a class="nav-link text-active-primary d-flex align-items-center pb-4" [class.active]="selectedTab === 'general'" (click)="selectTab('general')">
                <i class="ki-duotone ki-home fs-4 me-1"></i>General</a>
            </li>
            <li class="nav-item" style="cursor: pointer;">
                <a class="nav-link text-active-primary d-flex align-items-center pb-4" [class.active]="selectedTab === 'schedule'" (click)="selectTab('schedule')">
                <i class="ki-duotone ki-calendar-8 fs-4 me-1">
                    <span class="path1"></span>
                    <span class="path2"></span>
                    <span class="path3"></span>
                    <span class="path4"></span>
                    <span class="path5"></span>
                    <span class="path6"></span>
                </i>Agendar</a>
            </li>
            <li class="nav-item" style="cursor: pointer;">
                <a class="nav-link text-active-primary d-flex align-items-center pb-4" [class.active]="selectedTab === 'reviews'" (click)="selectTab('reviews')">
                <i class="ki-duotone ki-save-2 fs-4 me-1">
                    <span class="path1"></span>
                    <span class="path2"></span>
                </i>Reseñas</a>
            </li>
        </ul>
        <div class="tab-content" id="">
            @if (selectedTab === 'general') {
                <app-doctor-general-tab [doctor]="doctor()"></app-doctor-general-tab>
            } @else if (selectedTab === 'schedule') {
                <app-doctor-schedule-tab [doctor]="doctor()" (onSelectSchedule)="selectSchedule($event)"></app-doctor-schedule-tab>
            } @else if (selectedTab === 'reviews') {
                <app-doctor-reviews-tab [reviews]="doctor()?.reviews ?? []"></app-doctor-reviews-tab>
            }
        </div>
    </div>
</div>

@if (isScheduling) {
    <div [class]="!isMobile() ? 'schedule-modal' : 'schedule-modal-mobile'">
        <app-doctor-schedule
            [isMobile]="isMobile()"
            (onClose)="onCloseDoctorSchedule($event)"
            [doctor]="doctor()"
            [selectedSchedule]="selectedSchedule"
        ></app-doctor-schedule>
    </div>
}
