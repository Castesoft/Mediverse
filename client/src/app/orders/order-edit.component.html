@if (item()) {
  <form [formGroup]="formGroup">
    <div class="card card-flush py-4">
      <div class="card-header">
        <div class="d-flex flex-grow-1 justify-content-between mb-4">
          <div class="card-title">
            <h2>
              Editar Pedido #{{ item().id }}
            </h2>
          </div>
        </div>
      </div>
      <div class="card-body pt-0">
        <div class="row row-cols-2">
          <div controlSelect
               class="mt-0"
               formControlName="status"
               [label]="'Estatus de Pago'"
               [options]="statusSelectOptions"
          ></div>
          <div controlSelect
               formControlName="deliveryStatus"
               [options]="deliveryStatusSelectOptions"
               [label]="'Estatus de Entrega'"></div>
        </div>
      </div>
    </div>
    <div class="d-flex flex-grow-1 justify-content-end mt-8">
      <a class="btn btn-light me-5"
         [routerLink]="['/orders']">
        Cancelar
      </a>
      <button class="btn btn-primary"
              [disabled]="!formGroup.valid"
              [type]="'button'"
              (click)="onSubmit()">
        Guardar Cambios
      </button>
    </div>
  </form>
}
