@if (service.current()) {
  <div class="cursor-pointer symbol symbol-35px symbol-lg-35px" dropdownToggle tabindex="0">
    <div userProfilePicture [fullName]="service.current()!.fullName" [photoUrl]="service.current()!.photoUrl"></div>
  </div>
  <div
    class="dropdown-menu dropdown-menu-right menu menu-sub menu-sub-dropdown menu-column menu-rounded menu-gray-800 menu-state-bg menu-state-color fw-semibold py-4 fs-6 w-275px"
    *dropdownMenu>
    <div class="menu-item px-3">
      <div class="menu-content d-flex align-items-center px-3" style="overflow-x: clip;">
        <div class="symbol symbol-50px me-5">
          <div userProfilePicture [fullName]="service.current()!.fullName"
               [photoUrl]="service.current()!.photoUrl"></div>
        </div>
        <div class="d-flex flex-column">
          <div class="fw-bold d-flex align-items-center fs-5">{{ service.current()!.fullName }}
          </div>
          <a [routerLink]="[]" class="fw-semibold text-muted text-hover-primary fs-7">{{ service.current()!.email }}</a>
        </div>
      </div>
    </div>
    <div class="separator my-2"></div>
    <div class="menu-item px-5">
      <a [routerLink]="['/cuenta']" class="menu-link px-5">Mi cuenta</a>
    </div>
    <div class="menu-item px-5">
      <div class="menu-sub menu-sub-dropdown w-175px py-4">
        <div class="menu-item px-3">
          <a [routerLink]="['/cuenta/facturacion']" class="menu-link px-5">Facturación</a>
        </div>
        <div class="menu-item px-3">
          <a [routerLink]="['/cuenta/pagos']" class="menu-link px-5">Pagos</a>
        </div>
        <div class="separator my-2"></div>
      </div>
    </div>
    <div class="separator my-2"></div>
    <div class="menu-item px-5 my-1">
      <a [routerLink]="['/cuenta/configuracion']" class="menu-link px-5">Configuración de cuenta</a>
    </div>
    <div class="menu-item px-5">
      <a [routerLink]="[]" (click)="service.logout()" class="menu-link px-5">Cerrar sesión</a>
    </div>
  </div>
}
