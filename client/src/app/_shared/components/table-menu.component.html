<div
  cdkMenu
  class="menu menu-sub menu-sub-dropdown menu-column menu-rounded menu-gray-600 menu-state-bg-light-primary fw-semibold fs-7 w-125px py-4 show"
>
  <div cdkMenuItem class="menu-item px-3">
    <a
      class="menu-link"
      [href]="service().dictionary.catalogRoute + '/' + item().id"
      (click)="
          service().clickLink(item(), key(), 'detail', 'page');
          $event.stopPropagation();
          $event.preventDefault()
        "
    >
      Ver {{ service().dictionary.singular }}
    </a>
  </div>

  <div cdkMenuItem class="menu-item px-3">
    <a
      class="menu-link"
      [href]="service().dictionary.catalogRoute + '/' + item().id"
      (click)="
          service().clickLink(item(), key(), 'detail', 'modal');
          $event.stopPropagation();
          $event.preventDefault();
        "
    >
      Abrir {{ service().dictionary.singular }} en pantalla modal
    </a>
  </div>

  <div cdkMenuItem class="menu-item px-3">
    <a class="menu-link" [routerLink]="[service().dictionary.catalogRoute, item().id, 'editar']">
      Editar
    </a>
  </div>

  <button cdkMenuItem class="menu-item px-3" (click)="downloadClicked.emit()">
    <a class="menu-link">Descargar</a>
  </button>

  <button cdkMenuItem class="menu-item px-3" (click)="printClicked.emit()">
    <a class="menu-link">Imprimir</a>
  </button>

  <button cdkMenuItem class="menu-item px-3 text-danger" (click)="service().delete$(item())">
    <a class="menu-link text-danger">Eliminar</a>
  </button>
</div>
