<h2 mat-dialog-title>{{ title }}</h2>
<mat-dialog-content>
  <p>{{ message }}</p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="onDismiss()">{{ cancelButtonText }}</button>
  <button mat-raised-button [color]="confirmButtonColor" (click)="onConfirm()" cdkFocusInitial>{{ confirmButtonText }}
  </button>
</mat-dialog-actions>
