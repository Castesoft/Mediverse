<div toolbar>
  <div toolbarContainer>
    <div toolbarInfo>
      <h1 toolbarTitle [title]="title"></h1>
      <ul breadcrumb>
        @for (crumb of breadcrumbs; track crumb) {
          <li
            breadcrumbLink
            [label]="crumb.label"
            [url]="crumb.url || undefined"
            [active]="false">
            {{ crumb.label }}
          </li>
        }
      </ul>
    </div>
    <div toolbarActions>
      <ng-content></ng-content>
    </div>
  </div>
</div>
