<div class="border-bottom border-gray-200 p-5">
  <h4 class="fw-bolder m-0">Confirmación</h4>
</div>
<p class="p-5 pb-0 m-0">{{ data.message }}</p>
<div class="d-flex flex-grow-1 justify-content-end p-5">
  <button class="btn btn-sm btn-light-secondary" (click)="onCancel()">
    Cancelar
  </button>
  <button class="btn btn-sm btn-primary ms-2" (click)="onConfirm()">
    Continuar
  </button>
</div>
