<ng-template #patientDisplay let-model="item" let-index="index">
  <div class="d-flex align-items-center">
    <div class="symbol symbol-50px symbol-circle">
      <img [src]="model.data.photoUrl || 'https://i.pravatar.cc/150'" class="w-100"/>
      <div
        class="bg-success position-absolute border border-4 border-body h-15px w-15px rounded-circle translate-middle start-100 top-100 ms-n3 mt-n3">
      </div>
    </div>
    <div class="d-flex flex-column ms-4">
      <div class="fw-bolder fs-5">{{ model.data.fullName }}</div>
      <div class="fs-6 text-gray-600">{{ model.data.sex }}   | {{ model.data.age }} años</div>
    </div>
  </div>
</ng-template>


<div [formGroup]="formGroup">
  <label
    class="form-label fw-semi-bold fs--1 mb-0 d-flex m-0"
  >
    {{ label() }}

    @if (popover()) {
      <fa-icon
        class="ms-1"
        [icon]="icons.faRegCircleQuestion"
        [popover]="popover()"
        triggers="mouseenter:mouseleave"
      />
    }
  </label>
  <div class="input-group mb-0 mb-md-3 d-flex flex-grow-1 align-items-start">
    <div
      controlTypeahead
      (onSelect)="onTypeaheadSelect($event)"
      (onLoading)="onTypeaheadLoading($event)"
      [typeaheadOptionField]="'name'"
      class="col"
      formControlName="userTypeahead"
      [typeaheadItemTemplate]="patientDisplay"
      [typeaheadOptions]="userSummaries$"
      [placeholder]="'Seleccione o busque un paciente'"
      [hideIsOptional]="true"
      [isInputGroupSpan]="true"
      [submitted]="submitted"
      [id]="'user'"
    ></div>

    <button
      [disabled]="isDisabled()"
      class="btn fs-1 py-2"
      [style.height.px]="43"
      type="button" id="button-addon2"
      [class.btn-primary]="!isUserSelected()"
      [class.btn-danger]="isUserSelected() && selectionErrors().length > 0"
      [class.btn-success]="
        isUserSelected() && selectionErrors().length <= 0
      "
      [style.padding-top]="'12px'"
      [style.padding-bottom]="'12px'"
      [type]="'button'"
      (click)="service.showCatalogModal($event, guid(), 'select', 'Patient')"
    >
      @if (loading) {
        <div class="spinner-border text-white custom-spinner" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
      } @else {
        <fa-icon [icon]="icons.faWindowRestore"/>
      }
    </button>
  </div>
</div>

@if (selectionErrors().length > 0) {
  <alert [type]="'danger'">
    <div class="d-flex align-items-center">
      <div>
        <div class="fw-bold fs--1">Error en la selección</div>
        <div class="fs--1">
          <ul class="mb-0">
            @for (error of selectionErrors(); track error) {
              <li>{{ error }}</li>
            }
          </ul>
        </div>
      </div>
    </div>
  </alert>
}
