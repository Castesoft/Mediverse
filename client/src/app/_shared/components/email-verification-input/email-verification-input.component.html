<form class="form w-100" [formGroup]="verifyForm" (ngSubmit)="verify()">
  <div class="fv-row mb-4">
    <div
      class="fv-row fv-plugins-icon-container"
      inputControl
      formControlName="verificationCode"
      type="text"
      [label]="'Código de Verificación'"
      [placeholder]="'Ingresa el código de 6 dígitos'"
      [submitted]="submitted"
      [errors]="{
          required: 'El código es requerido.',
          minlength: 'El código debe tener 6 dígitos.',
          maxlength: 'El código debe tener 6 dígitos.',
          invalidCode: 'El código es incorrecto o ha expirado.'
      }"
    ></div>
  </div>


  <div class="d-flex flex-wrap justify-content-start">
    <button type="submit" class="btn btn-primary fw-bold me-4" [disabled]="verifyForm.invalid || loadingVerify">
      @if (loadingVerify) {
        <span class="spinner-border spinner-border-sm align-middle ms-2"></span> Verificando...
      } @else {
        Verificar
      }
    </button>

    <button type="button" class="btn btn-light-primary fw-bold" (click)="resendCode()" [disabled]="loadingResend">
      @if (loadingResend) {
        <span class="spinner-border spinner-border-sm align-middle ms-2"></span> Enviando...
      } @else {
        Reenviar Código
      }
    </button>
  </div>
</form>
