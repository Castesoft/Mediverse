<div class="form-check">
  <input
    class="form-check-input"
    type="checkbox"
    [formControl]="control"
    [value]="control.value"
    [id]="id ? id : controlName"
    [attr.autofocus]="autofocus() ? true : null"
    [ngClass]="{
      'is-invalid': submitted() && control.invalid,
      'is-valid': submitted() && control.valid
    }"
    [attr.aria-describedby]="formText() ? controlName+'helpBlock' : null"
    [attr.aria-label]="label ? label + ' input' : null"
    >
  <label
    class="form-check-label"
    [for]="id? id : controlName"
    >
    {{label}}
  </label>
  @if(control.errors && control.errors['length'] > 0) {<div invalidFeedback [errors]="errors()" [control]="control" [submitted]="submitted()"></div>}
</div>

@if(formText()) {<div helpBlock [controlName]="controlName" [formText]="formText()"></div>}
