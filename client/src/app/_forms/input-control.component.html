<label [for]="id ? id : controlName" class="fw-semibold fs-6 mb-2"
     [class.required]="!service.isOptional(control) || isReadonly">
{{ label }}
</label>
<input [type]="type" [formControl]="control" [placeholder]="placeholder" [autocomplete]="autocomplete"
       [spellcheck]="spellcheck" [attr.role]="role" [id]="id ? id : controlName" [attr.list]="controlName + 'datalist'"
       [attr.autofocus]="autofocus() ? 'autofocus' : null" [readonly]="isReadonly"
       class="form-control mb-3 mb-lg-0"
       [class.form-control-solid]="style() === 'solid'"
       [ngClass]="{
      'is-invalid': submitted() && control.invalid,
      'is-valid': submitted() && control.valid,
      'border-warning border-2': isPending,
    }" [attr.aria-describedby]="formText() ? controlName + 'helpBlock' : null" [attr.aria-label]="label + ' input'"/>
@if (datalistOptions) {
  <datalist [id]="controlName + 'datalist'">
    @for (option of datalistOptions; track option) {
      <option [value]="option.name"></option>
    }
  </datalist>
}
@if (control.status === "PENDING" && control.dirty) {
  <div class="spinner-border spinner-border-sm text-primary ms-2 inset" role="status">
    <span class="visually-hidden">Loading...</span>
  </div>
}

@if (control.errors) {
  <div invalidFeedback [errors]="errors()" [control]="control" [submitted]="submitted()"></div>
}
@if (formText()) {
  <div helpBlock [controlName]="controlName" [formText]="formText()"></div>
}
