
{{ control().label }}
{{ control().required ? '*' : null }}
@if (control().optional) {
  @if (service.isOptional(control()) || !control().isReadonly) {
    <span optionalSpan3></span>
  }
}
@if (control().isNew) {
  <fa-icon [icon]="icons.faCircle" class="text-info ms-1 new-page-indicator" style="font-size: 6px;"></fa-icon>
}
