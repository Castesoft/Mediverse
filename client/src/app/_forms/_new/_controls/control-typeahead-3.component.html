@if (control().orientation === 'inline') {
  <div class="d-flex align-items-center gap-2">
    @if (control().showLabel) {
      <label [for]="control().id"
             class="col-form-label fw-semibold fs-8 text-nowrap">
        {{ control().label }}
        {{ control().required ? '*' : null }}
        @if (control().optional) {
          @if (service.isOptional(control()) || !control().isReadonly) {
            <span optionalSpan></span>
          }
        }
        @if (control().isNew) {
          <span newBadge></span>
        }
      </label>
    }
    <input
      [formControl]="$any(control())"
      [placeholder]="(control().use !== 'detail' && control().placeholder) ? control().placeholder : ''"
      [autocomplete]="false"
      [spellcheck]="false"
      [id]="control().id"
      [readonly]="control().isReadonly"
      class="form-control text-body fs-8"
      [ngClass]="{
      'is-invalid': control().submitted && control().invalid,
      'is-valid': control().submitted && control().valid,
    }"
      [attr.aria-describedby]="control().helperText ? control().name + 'helpBlock' : null"
      [attr.aria-label]="control().label + ' input'"
      (typeaheadLoading)="onLoading.emit($event)"
      (typeaheadOnSelect)="onSelect.emit($event)"
      [adaptivePosition]="true"
      [style.border-bottom-right-radius.px]="control().showCodeSpan ? 0 : null"
      [style.border-top-right-radius.px]="control().showCodeSpan ? 0 : null"
      [typeaheadAsync]="control().typeahead.async"
      [typeaheadHideResultsOnBlur]="true"
      [typeaheadMinLength]="0"
      [typeaheadOptionField]="control().typeahead.field"
      [typeaheadOptionsInScrollableView]="control().typeahead.scrollable"
      [typeaheadScrollable]="true"
      [typeaheadOptionsLimit]="control().typeahead.limit"
      [typeahead]="control().typeahead.options"
    >
  </div>
} @else {
  @if (control().showLabel) {
    <label [for]="control().id"
           class="form-label fw-semibold fs-8 text-nowrap">
      {{ control().label }}
      {{ control().required ? '*' : null }}
      @if (control().optional) {
        @if (service.isOptional(control()) || !control().isReadonly) {
          <span optionalSpan></span>
        }
      }
      @if (control().isNew) {
        <span newBadge></span>
      }
    </label>
  }

  <input
    [formControl]="$any(control())"
    [placeholder]="(control().use !== 'detail' && control().placeholder) ? control().placeholder : ''"
    [autocomplete]="false"
    [spellcheck]="false"
    [id]="control().id"
    [readonly]="control().isReadonly"
    class="form-control text-body fs-8"
    [ngClass]="{
      'is-invalid': control().submitted && control().invalid,
      'is-valid': control().submitted && control().valid,
    }"
    [attr.aria-describedby]="control().helperText ? control().name + 'helpBlock' : null"
    [attr.aria-label]="control().label + ' input'"
    (typeaheadLoading)="onLoading.emit($event)"
    (typeaheadOnSelect)="onSelect.emit($event)"
    [adaptivePosition]="true"
    [style.border-bottom-right-radius.px]="control().showCodeSpan ? 0 : null"
    [style.border-top-right-radius.px]="control().showCodeSpan ? 0 : null"
    [typeaheadAsync]="control().typeahead.async"
    [typeaheadHideResultsOnBlur]="true"
    [typeaheadMinLength]="0"
    [typeaheadOptionField]="control().typeahead.field"
    [typeaheadOptionsInScrollableView]="control().typeahead.scrollable"
    [typeaheadScrollable]="true"
    [typeaheadOptionsLimit]="control().typeahead.limit"
    [typeahead]="control().typeahead.options"
  >
}

@if (control().errors) {
  <div invalidFeedback3
       [errors]="control().validationErrors"
       [control]="control()"
       [submitted]="$any(control().root).submitted">
  </div>
}
@if (control().helperText) {
  <div helpBlock3 [(control)]="control"></div>
}
