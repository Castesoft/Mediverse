<mat-form-field [subscriptSizing]="'fixed'" appearance="outline" class="hide-bottom" style="display: flex;">
  <mat-label>{{control().label}}</mat-label>
  <mat-select [(ngModel)]="control().value" [name]="control().name">
    @for (option of control().selectOptions; track option) {
      <mat-option [value]="option">{{option.name}}</mat-option>
    }
  </mat-select>
</mat-form-field>
