@if(control().title){
  <label class="fs-6 fw-semibold form-label" [for]="guid">{{control().title}}</label>
  <input type="text" style="display: none;" [id]="guid">
}

@if (control().orientation === 'inline') {
  <div class="d-flex align-items-center gap-2">
    <mat-checkbox [formControl]="$any(control())"
                      [id]="control().id">
      @if(control().showLabel){<span class="col-form-label fw-semibold fs-6 text-nowrap">{{ control().label }}</span>}
    </mat-checkbox>
  </div>
} @else {
  <mat-checkbox [formControl]="$any(control())" style="display: block;">
    @if(control().showLabel){<span class="col-form-label fw-semibold fs-6 text-nowrap">{{ control().label }}</span>}
  </mat-checkbox>
}

@if (control().errors) {
  <div invalidFeedback3
       [errors]="control().validationErrors"
       [control]="control()"
       [submitted]="$any(control().root).submitted">
  </div>
}
@if (control().helperText) {
  <div helpBlock3
       [(control)]="control"></div>
}
