@if(control().orientation === 'inline') {
<div class="d-flex align-items-center gap-2">
  @if(control().showLabel) {
    <label controlLabel3 [(control)]="control"></label>
  }
  <input matInput [matDatepicker]="picker" [formControl]="$any(control())" (click)="picker.open()"
    [placeholder]="(control().use !== 'detail' && control().placeholder) ? control().placeholder! : ''"
    [autocomplete]="false" [spellcheck]="false" [id]="control().id" [readonly]="control().isReadonly"
    class="form-control text-body " [ngClass]="{
      'is-invalid': control().submitted && control().invalid,
      'is-valid': control().submitted && control().valid,
    }" [attr.aria-describedby]="control().helperText ? control().name + 'helpBlock' : null"
    [attr.aria-label]="control().label + ' input'" type="text">
  <!-- <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle> -->
  <mat-datepicker #picker></mat-datepicker>
</div>
} @else {
@if(control().showLabel) {
  <label controlLabel3 [(control)]="control"></label>
}

<input matInput [matDatepicker]="picker" [formControl]="$any(control())" (click)="picker.open()"
[placeholder]="(control().use !== 'detail' && control().placeholder) ? control().placeholder! : ''"
[autocomplete]="false" [spellcheck]="false" [id]="control().id" [readonly]="control().isReadonly"
class="form-control text-body " [ngClass]="{
  'is-invalid': control().submitted && control().invalid,
  'is-valid': control().submitted && control().valid,
}" [attr.aria-describedby]="control().helperText ? control().name + 'helpBlock' : null"
[attr.aria-label]="control().label + ' input'" type="text">
<!-- <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle> -->
<mat-datepicker #picker></mat-datepicker>
}

@if (control().errors) {
  <div invalidFeedback3
       [errors]="control().validationErrors"
       [control]="control()"
       [submitted]="control().submitted">
  </div>
}
@if (control().helperText) {
  <div helpBlock3 [(control)]="control"></div>
}
