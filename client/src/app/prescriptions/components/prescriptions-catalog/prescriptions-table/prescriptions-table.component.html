<thead
(onSelectAll)="service.onSelectAll(key(), mode(), $event)"
[isCompact]="false"
[(dictionary)]="service.dictionary"
[columns]="columns"
[(mode)]="mode"
[params]="params"
[show]="showHeaders()"
tableHeader
></thead>
<tbody class="text-gray-600 fw-semibold">
    @for (item of data(); track item.id; let idx = $index) {
    <tr class="hover-actions-trigger btn-reveal-trigger position-static cursor-pointer" style="border-bottom: none;" (click)="toggleCollapsed(item)" [attr.aria-expanded]="!item.isCollapsed" [attr.aria-controls]="'collapseBasic' + item.id" [attr.data-target]="'collapseBasic' + item.id"
        [cdkContextMenuTriggerFor]="context_menu">
      @switch (mode()) {
        @case ("view") {
          <td class="py-1 fs--1 pe-3 ps-1 border-none">
            <div class="form-check form-check-sm form-check-custom form-check-solid">
              <input
                class="form-check-input"
                type="checkbox"
                [name]="service.dictionary.singular"
                [(ngModel)]="item.isSelected"
                [id]="cuid + 'tableCheck' + idx"
                (click)="stopPropagation($event)"
              />
            </div>
          </td>
        }
        @case ("select") {
          <td class="fs--1 align-middle">
            <div class="form-check form-check-sm form-check-custom form-check-solid">
              <input
                class="form-check-input"
                type="radio"
                [name]="service.dictionary.singular"
                [checked]="item.isSelected"
                (click)="stopPropagation($event)"
              />
            </div>
          </td>
        }
        @case ("multiselect") {
          <td class="py-1 fs--1 pe-3 ps-1 border-none">
            <div class="form-check form-check-sm form-check-custom form-check-solid">
              <input
                class="form-check-input"
                type="checkbox"
                [name]="service.dictionary.singular"
                [checked]="item.isSelected"
                [id]="cuid + 'tableCheck' + idx"
              />
            </div>
          </td>
        }
      }
      <td class="d-flex flex-grow-1">
        <div class="symbol symbol-circle symbol-50px overflow-hidden me-3 flex-shrink-0">
          <a>
            <div class="symbol-label">
              <div userProfilePicture [fullName]="item.patient.fullName" [photoUrl]="item.patient.photoUrl"
              ></div>
            </div>
          </a>
        </div>
        <div class="d-flex flex-column flex-grow-1">
          <a class="text-gray-800 text-hover-primary mb-1">{{ item.patient!.name! }}</a>
          <span class="d-flex align-items-center">
            {{ item.notes }}
            @if (item.isCollapsed) {
              <i class="ki-duotone ki-down ms-2 fs-4"><span class="path1"></span><span class="path2"></span></i>
            } @else {
              <i class="ki-duotone ki-up ms-2 fs-4"><span class="path1"></span><span class="path2"></span></i>
            }
          </span>
        </div>
      </td>
      <td>{{ item.createdAt | date }}</td>

      <td class="text-end">
        <div class="d-flex justify-content-end">
          <a class="btn btn-icon btn-bg-light btn-active-color-primary btn-sm me-1"
             [routerLink]="[service.dictionary.catalogRoute,item.id]"
             tooltip="Ver detalles"
             (click)="$event.stopPropagation()">
            <i class="ki-duotone ki-eye fs-2"><span class="path1"></span><span class="path2"></span><span class="path3"></span></i>
          </a>
          <a class="btn btn-icon btn-bg-light btn-active-color-primary btn-sm me-1"
             [routerLink]="[service.dictionary.catalogRoute, item.id, 'edit']"
             tooltip="Editar"
             (click)="$event.stopPropagation()">
            <i class="ki-duotone ki-pencil fs-2"><span class="path1"></span><span class="path2"></span></i>
          </a>
          <button class="btn btn-icon btn-bg-light btn-active-color-primary btn-sm me-1"
                  (click)="deleteItem(item); $event.stopPropagation()"
                  tooltip="Eliminar">
            <i class="ki-duotone ki-trash fs-2"><span class="path1"></span><span class="path2"></span><span class="path3"></span><span class="path4"></span><span class="path5"></span></i>
          </button>
          <button class="btn btn-icon btn-bg-light btn-active-color-primary btn-sm me-1"
                  tooltip="Descargar"
                  (click)="downloadPrescription(item); $event.stopPropagation()">
            <i class="ki-duotone ki-cloud-download fs-2"><span class="path1"></span><span class="path2"></span></i>
          </button>
          <button class="btn btn-icon btn-bg-light btn-active-color-primary btn-sm"
                  tooltip="Imprimir"
                  (click)="printPrescription(item); $event.stopPropagation()">
            <i class="ki-duotone ki-printer fs-2"><span class="path1"></span><span class="path2"></span><span class="path3"></span><span class="path4"></span><span class="path5"></span></i>
          </button>
        </div>
      </td>
      <ng-template #context_menu>
        <div
          class="menu menu-sub menu-sub-dropdown menu-column menu-rounded menu-gray-600 menu-state-bg-light-primary fw-semibold fs-7 w-125px py-4 show"
          cdkMenu>
          <div cdkMenuItem
               class="menu-item px-3">
            <a [routerLink]="[service.dictionary.catalogRoute,item.id]"
               class="menu-link">Ver</a>
          </div>
          <div cdkMenuItem
               class="menu-item px-3">
            <a [routerLink]="[service.dictionary.catalogRoute, item.id, 'edit']"
               class="menu-link">Editar</a>
          </div>
          <div cdkMenuItem
               class="menu-item px-3">
            <a class="menu-link">Descargar</a>
          </div>
          <div cdkMenuItem
               class="menu-item px-3">
            <a class="menu-link" (click)="printPrescription(item)">Imprimir</a>
          </div>
          <button cdkMenuItem
                  class="menu-item px-3 text-danger"
                  (click)="deleteItem(item)">
            <a class="menu-link">Eliminar</a>
          </button>
        </div>
      </ng-template>
    </tr>
    <tr>
        <td colspan="100" style="padding: 0;">
            <div [collapse]="!item.isCollapsed" [id]="'collapseBasic' + item.id" [isAnimated]="true">
              <div class="p-4">
                <!-- <div prescriptionForm
                  [id]="null"
                  [use]="'detail'"
                  [view]="'inline'"
                  [(item)]="data[idx]"
                ></div> -->
              </div>
            </div>
        </td>
    </tr>
    }
</tbody>
