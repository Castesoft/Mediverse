<div class="modal-content border">
  <div class="modal-header border-200 p-4">
    <h4 class="modal-title text-1000 fs-2 lh-sm">Filtros</h4>
    <button class="btn p-1 text-900" type="button" aria-label="Close" (click)="modal.hide()">
      <fa-icon [icon]="icons.faTimes" class="fs--1" />
    </button>
  </div>
  @if (visible) {
    <div class="modal-body py-3 px-4" filterForm></div>
    <div class="modal-footer d-flex justify-content-end align-items-center px-4 pb-4 border-0 pt-3">
      <button class="btn btn-sm btn-phoenix-primary px-4 fs--2 my-0" type="button" (click)="service.resetParams()">
        <fa-icon [icon]="icons.faArrowsRotate" class="me-2 fs--2"></fa-icon>Restablecer</button>
      <button class="btn btn-sm btn-primary px-9 fs--2 my-0" type="submit" [attr.form]="formId">Aplicar</button>
    </div>
  } @else {
    El formulario requiere que se le proporcione el tipo de catálogo.
  }
</div>
