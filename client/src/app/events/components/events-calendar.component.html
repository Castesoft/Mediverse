<div class="card-header">
  <h2 class="card-title fw-bold">Citas</h2>
  <div class="card-toolbar">
    <ul class="nav nav-pills me-3 mb-2 mb-sm-0">
      <li class="nav-item m-0">
        <a (click)="calendarView = 'table'"
           [class.active]="calendarView === 'table'"
           class="btn btn-icon btn-light btn-color-muted btn-active-primary me-3"
           data-bs-toggle="tab">
          <i class="ki-duotone ki-row-horizontal fs-1">
            <span class="path1"></span>
            <span class="path2"></span>
          </i>
        </a>
      </li>
      <li class="nav-item m-0">
        <a (click)="calendarView = 'calendar'"
           [class.active]="calendarView === 'calendar'"
           class="btn btn-icon btn-light btn-color-muted btn-active-primary"
           data-bs-toggle="tab">
          <i class="ki-duotone ki-calendar fs-1">
            <span class="path1"></span>
            <span class="path2"></span>
          </i>
        </a>
      </li>
    </ul>
    <button
      (click)="service.clickLink(null, null, key(), 'create', 'modal')"
      [naming]="service.naming!"
      createBtn
    ></button>

  </div>
</div>

@if (calendarOptions && calendarView === 'calendar') {
  <div class="card-body">
    <full-calendar #fullcalendar
                   [options]="calendarOptions">
      <ng-template #eventContent
                   let-arg>
        <div class="d-flex flex-grow-1 flex-column px-1 {{ arg.event.extendedProps.bgColor }}">
          <div class="fw-bold text-white">
            {{ arg.event.extendedProps.patient }}
          </div>
          <div class="text-white">
            {{ formatTimeRange(arg.event.start, arg.event.end) }}
          </div>
        </div>
      </ng-template>
    </full-calendar>
  </div>
} @else {
  <div eventsCatalog
       [key]="key()"
       [role]="role()"
       [mode]="mode()"
       [view]="view()"
       [hideAddButton]="true"></div>
}
