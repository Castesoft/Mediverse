@if (item()) {
  @if (title()) {
    <div class="card-header header-fixed-height">
      <div class="fs-2 fw-bold text-gray-900">{{ title() }}</div>
    </div>
  }
  <div class="d-flex flex-grow-1 justify-content-start align-items-center">
    <div class="w-100">
      <div class="d-flex flex-grow-1 justify-content-between align-items-center">
        <div>
          <span class="fw-bold fs-4">
            {{ item()!.dateFrom | date }}
          </span>
          <span>
          {{ item()!.dateFrom | date: 'shortTime' }} - {{ item()!.dateTo | date: 'shortTime' }}
          </span>
        </div>
      </div>
      <div class="event-details mt-0">
        <div>{{ item()!.service?.name }}</div>
      </div>
    </div>
  </div>
} @else {
  <div class="card-body p-2 pt-4 pb-3">
    <div class="d-flex flex-grow-1 justify-content-start align-items-center">
      <a [routerLink]="'/home'"
         class="symbol symbol-50px symbol-circle">
        <div></div>
      </a>
      <div class="ms-4 w-100">
        <div class="d-flex flex-grow-1 justify-content-between align-items-center">
          <div>Seleccione un paciente</div>
        </div>
      </div>
    </div>
  </div>
}
