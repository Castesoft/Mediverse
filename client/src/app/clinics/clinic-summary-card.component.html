<div class="card">
  @if (title()) {
    <div class="card-header">
      <div class="fs-2 fw-bold text-gray-900">{{ title() }}</div>
    </div>
  }
  <div class="card-body p-4">
    <div class="d-flex flex-grow-1 justify-content-start align-items-center">
      <a [href]="generateMapsUrl(item())" class=" symbol symbol-65px">
        <img alt="" src="media/custom/maps-placeholder.png"/>
      </a>
      <div class="ms-4 w-100">
        <div class="d-flex flex-grow-1 justify-content-between align-items-center mb-2">
          <div>
            <div class="fw-bold fs-4">
              {{ item().name }}
            </div>
            <div class="fs-6">
              {{ item().street }}, #{{ item().exteriorNumber }}  {{ item().interiorNumber }}
            </div>
          </div>
          <div class="btn btn-light-primary p-3 px-4">
            <fa-icon [icon]="icons.faPencil" class="me-1"></fa-icon>
          </div>
        </div>
      </div>
      <br/>
    </div>
  </div>
</div>
