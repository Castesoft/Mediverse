<table class="table align-middle table-row-dashed fs-6 gy-5 dataTable no-footer">
  <thead
    tableHeader
    [mode]="'readonly'"
    [columns]="columns"
    [isCompact]="true"
    [disableFirstCellPadding]="true"
    [showActions]="false"></thead>
  <tbody>
    @for (wh of availableWarehouses(); track wh) {
      <tr class="hover-actions-trigger btn-reveal-trigger position-static">
        <td class="fw-bold">{{ wh.name }}</td>
        <td class="fw-light">{{ wh.code }}</td>
        <td class="text-center">
          <div class="form-check form-switch">
            <input
              type="checkbox"
              class="form-check-input"
              role="switch"
              [checked]="isSelected(wh.id)"
              [disabled]="use() == FormUse.DETAIL"
              (change)="toggleSelection(wh.id, $event)">
          </div>
        </td>
      </tr>
    }
  </tbody>
</table>
@if (changed) {
  <div class="mt-3 text-end">
    <button type="button" class="btn btn-primary" (click)="saveChanges()">Save Warehouse Changes</button>
  </div>
}
