<form [id]="form.id" (ngSubmit)="service.create(form.getRawValue(), true)">
    @if (form.error !== null) {
      <div errorsAlert3 [(error)]="form.error"></div>
    }

  <div formBuilder3 [cols]="2" [controls]="[
    form.controls.name,
    form.controls.description,
    form.controls.price,
    form.controls.discount,

  ]"></div>

  <button type="submit" [attr.form]="form.id" class="btn btn-primary">Enviar</button>

</form>
