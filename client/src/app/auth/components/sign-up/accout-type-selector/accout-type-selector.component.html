<div class="current" data-kt-stepper-element="content">
  <div class="w-100">
    <div class="pb-10 pb-lg-15">
      <h2 class="fw-bold d-flex align-items-center text-gray-900">Selecciona el tipo de cuenta
        <!-- <span class="ms-1" data-bs-toggle="tooltip" title="Billing is issued based on your selected account typ">
            <i class="ki-duotone ki-information-5 text-gray-500 fs-6">
                <span class="path1"></span>
                <span class="path2"></span>
                <span class="path3"></span>
            </i>
        </span> -->
      </h2>
      <div class="text-muted fw-normal fs-6">Si necesitas más información, entra a la
        <a href="#" class="link-primary fw-semibold">Página de ayuda</a>.
      </div>
    </div>
    <div class="fv-row">
      <div class="row">

        <div class="col-lg-6" (click)="selectAccountType('patient')">
          <input type="radio" class="btn-check" name="account_type" value="personal"
                 [checked]="accountType() === 'patient'" id="kt_create_account_form_account_type_personal"/>
          <label class="btn btn-outline btn-outline-dashed btn-active-light-primary p-7 d-flex align-items-center mb-10"
                 for="kt_create_account_form_account_type_personal">
            <i class="ki-duotone ki-badge fs-3x me-5">
              <span class="path1"></span>
              <span class="path2"></span>
              <span class="path3"></span>
              <span class="path4"></span>
              <span class="path5"></span>
            </i>
            <span class="d-block text-start">
              <span class="text-gray-900 fw-bold d-block fs-4 mb-0">Cuenta de Paciente</span>
              <span class="text-muted fs-6">Accede a una atención médica personalizada.</span>
            </span>
          </label>
        </div>

        <div class="col-lg-6" (click)="selectAccountType('doctor')">
          <input type="radio" class="btn-check" name="account_type" value="corporate"
                 [checked]="accountType() === 'doctor'" id="kt_create_account_form_account_type_corporate"/>
          <label class="btn btn-outline btn-outline-dashed btn-active-light-primary p-7 d-flex align-items-center"
                 for="kt_create_account_form_account_type_corporate">
            <i class="ki-duotone ki-briefcase fs-3x me-5">
              <span class="path1"></span>
              <span class="path2"></span>
            </i>
            <span class="d-block text-start">
              <span class="text-gray-900 fw-bold d-block fs-4 mb-0">Cuenta de Especialista</span>
              <span class="text-muted fs-6">Ofrece tus servicios y gestiona tus consultas.</span>
            </span>
          </label>
        </div>
      </div>
    </div>
  </div>
</div>
