  <h1 class="text-dark mb-3">
    Crear una cuenta
  </h1>
</div>

<div class="card">
  <div class="card-body">
    <div class="row mb-5 gy-6">
      <div
        templateControlText
        class="col-xl-6"
        [(control)]="form().controls.firstName"
        [(fromWrapper)]="fromWrapper"
        [showBottomMargin]="false"
      ></div>

      <div
        templateControlText
        class="col-xl-6"
        [(control)]="form().controls.lastName"
        [(fromWrapper)]="fromWrapper"
        [showBottomMargin]="false"
      ></div>
      <div
        templateControlCheckRadio
        class="col-xl-6"
        [(control)]="form().controls.sex"
        [(fromWrapper)]="fromWrapper"
        [showBottomMargin]="false"
      ></div>

      <div
        templateControlDate
        class="col-xl-6"
        [(control)]="form().controls.dateOfBirth"
        [(fromWrapper)]="fromWrapper"
        [showBottomMargin]="false"
      ></div>

      <div templateControlText
           class="col-xl-12"
           [(control)]="form().controls.email"
           [(fromWrapper)]="fromWrapper"
           [showBottomMargin]="false"
      ></div>

      <div templateControlText
           class="col-xl-12"
           [(control)]="form().controls.password"
           [(fromWrapper)]="fromWrapper"
           [showBottomMargin]="false"
      ></div>

      <div templateControlText
           class="col-xl-12 mb-3"
           [(control)]="form().controls.confirmPassword"
           [(fromWrapper)]="fromWrapper"
           [showBottomMargin]="false"
      ></div>

      <div templateControlCheckbox
           class="col-xl-12 my-3"
           [(control)]="form().controls.agreeTerms"
           [(fromWrapper)]="fromWrapper"
           [showBottomMargin]="false">
        Estoy de acuerdo con los
        <a
          class="link-primary"
          style="cursor: pointer;"
          (click)="openTermsAndConditionsModal()"
        >
          Términos y condiciones
        </a>.
      </div>
    </div>


    <button
      [disabled]="!form().controls.agreeTerms.getRawValue()"
      type="submit"
      class="btn btn-primary w-100"
    >
      Crear cuenta
    </button>
  </div>
</div>
