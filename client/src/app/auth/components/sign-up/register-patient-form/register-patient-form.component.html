
<div class="mb-10 text-center">
  <h1 class="text-dark mb-3">
  Crear una cuenta
  </h1>

  <div class="text-gray-400 fw-semibold fs-4">
      ¿Ya tienes una cuenta?

      <a routerLink="/auth/sign-in" class="link-primary fw-bold">
          Inicia sesión aquí
      </a>
  </div>
</div>

  Iniciar sesión con Google

<div class="mb-10 w-100 d-flex justify-content-center">
  <div id="google-btn-signup"></div>
</div>

<div class="d-flex align-items-center mb-10">
  <div class="border-bottom border-gray-300 mw-50 w-100"></div>
  <span class="fw-semibold text-gray-400 fs-7 mx-2">O</span>
  <div class="border-bottom border-gray-300 mw-50 w-100"></div>
</div>

<div class="row mb-5">
  <div class="col-xl-6">
      <div templateControlText [(control)]="form().controls.firstName" [(fromWrapper)]="fromWrapper"></div>
  </div>

  <div class="col-xl-6">
      <div templateControlText [(control)]="form().controls.lastName" [(fromWrapper)]="fromWrapper"></div>
    </div>
  <div class="col-xl-6">
      <div templateControlCheckRadio [(control)]="form().controls.sex" [(fromWrapper)]="fromWrapper"></div>
  </div>

  <div class="col-xl-6">
      <div templateControlDate [(control)]="form().controls.dateOfBirth" [(fromWrapper)]="fromWrapper"></div>
    </div>
  </div>


<div templateControlText [(control)]="form().controls.email" [(fromWrapper)]="fromWrapper"></div>

<div templateControlText [(control)]="form().controls.password" [(fromWrapper)]="fromWrapper"></div>

<div templateControlText [(control)]="form().controls.confirmPassword" [(fromWrapper)]="fromWrapper"></div>

<div templateControlCheckbox [(control)]="form().controls.agreeTerms" [(fromWrapper)]="fromWrapper">
Estoy de acuerdo con los <a (click)="openTermsAndConditionsModal()" class="ms-1 link-primary" style="cursor: pointer;">Términos y condiciones</a>.
</div>
