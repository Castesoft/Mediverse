<div class="d-flex flex-column flex-lg-row-auto w-xl-400px positon-xl-relative bg-dark" data-bs-theme="light">
  <div class="d-flex flex-column position-xl-fixed top-0 bottom-0 w-xl-400px scroll-y">
    <div class="d-flex flex-row-fluid flex-column align-items-center align-items-lg-start p-10 p-lg-20">
      <a href="index.html" class="mb-10 mb-lg-20">
        <app-logo-icon></app-logo-icon>
      </a>
      <div class="stepper-nav">
        @for (step of steps(); track $index) {
          <div class="stepper-item"
               [ngClass]="{current: currentStep() === step.number, completed: currentStep() > step.number, pending: currentStep() < step.number}"
               data-kt-stepper-element="nav">
            <div class="stepper-wrapper">
              <div class="stepper-icon rounded-3">
                <fa-icon class="stepper-check fas fa-check" [icon]="icons.faCheck"></fa-icon>
                <span class="stepper-number">{{ step.number }}</span>
              </div>
              <div class="stepper-label">
                <h3 class="stepper-title fs-2">{{ step.title }}</h3>
                <div class="stepper-desc fw-normal">{{ step.subtitle }}</div>
              </div>
            </div>
            @if (steps().length > step.number) {
              <div class="stepper-line h-40px"></div>
            }
          </div>
        }
      </div>
    </div>
  </div>
</div>
