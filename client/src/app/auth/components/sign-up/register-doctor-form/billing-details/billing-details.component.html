<div class="mb-10 text-center">
  <h1 class="text-dark mb-3">
    Datos de Facturación
  </h1>
</div>

<div class="card">
  <div class="card-body">

    <form
      class="form w-100"
      novalidate="novalidate"
      [formGroup]="myForm">
      <div
        class="fv-row mb-4 fv-plugins-icon-container"
        inputControl
        formControlName="DisplayName"
        [label]="'Nombre en la tarjeta'"
        [type]="'text'"
        [placeholder]="''"
        [errors]="{
                required: 'El nombre es requerido.'
            }"
      ></div>

      <div class="row g-8">
        <div class="col-6">
          <label class="fw-semibold fs-6 required">Número de tarjeta</label>
          <div class="form-control" #cardNumber></div>
        </div>
        <div class="col-3">
          <label class="fw-semibold fs-6 required">Expiración</label>
          <div class="form-control" #cardExpiry></div>
        </div>
        <div class="col-3">
          <label class="fw-semibold fs-6 required">CVC</label>
          <div class="form-control" #cardCvc></div>
        </div>
        @if (cardErrors) {
          <span class="text-danger">{{ cardErrors }}</span>
        }
      </div>

      <!-- Billing details START -->
      <div controlCheck formControlName="SameAddress" class="mt-5">
        <span class="form-check-label fw-semibold text-gray-700 fs-6">
          Utilizar mi dirección como dirección de facturación.
        </span>
      </div>

      @if (myForm.get('SameAddress')?.value !== true) {
        <div class="row mb-5 mt-5">
          <div class="col-xl-4">
            <div
              class="fv-row fv-plugins-icon-container"
              inputControl
              formControlName="BillingZipcode"
              [label]="'Código postal'"
              [type]="'tel'"
              [placeholder]="''"
              (input)="enterZipcode($event)"
              [errors]="{
                        required: 'El código postal es requerido.'
                    }"
            ></div>
          </div>

          <div class="col-xl-8">
            <div
              class="fv-row fv-plugins-icon-container"
              controlSelect
              formControlName="BillingNeighborhood"
              [label]="'Colonia'"
              [options]="neighborhoods"
              [placeholder]="neighborhoods.length > 0 ? 'Selecciona una colonia' : 'Ingresa tu código postal'"
              (change)="onNeighborhoodChange($event)"
              [errors]="{
                        required: 'La colonia es requerida.'
                    }"
            ></div>
          </div>
        </div>

        <div class="row mb-5">
          <div class="col-xl-6">
            <div
              class="fv-row fv-plugins-icon-container"
              inputControl
              formControlName="BillingCity"
              [label]="'Ciudad'"
              [placeholder]="''"
              [isReadonly]="true"
              [errors]="{
                        required: 'La ciudad es requerida.'
                    }"
            ></div>
          </div>

          <div class="col-xl-6">
            <div
              class="fv-row fv-plugins-icon-container"
              inputControl
              formControlName="BillingState"
              [label]="'Estado'"
              [placeholder]="''"
              [isReadonly]="true"
              [errors]="{
                        required: 'El estado es requerido.'
                    }"
            ></div>
          </div>
        </div>

        <div class="row mb-5">
          <div class="col-xl-6">
            <div
              class="fv-row fv-plugins-icon-container"
              inputControl
              formControlName="BillingAddress"
              [label]="'Calle'"
              [type]="'text'"
              [placeholder]="''"
              [errors]="{
                        required: 'La calle es requerida.'
                    }"
            ></div>
          </div>
          <div class="col-xl-3">
            <div
              class="fv-row fv-plugins-icon-container"
              inputControl
              formControlName="BillingExteriorNumber"
              [label]="'No. ext.'"
              [type]="'tel'"
              [placeholder]="''"
              [errors]="{
                        required: 'El número exterior es requerido.'
                    }"
            ></div>
          </div>
          <div class="col-xl-3">
            <div
              class="fv-row fv-plugins-icon-container"
              inputControl
              formControlName="BillingInteriorNumber"
              [label]="'No. int.'"
              [type]="'tel'"
              [placeholder]="''"
            ></div>
          </div>
        </div>
      }
      <!-- Billing details END -->

      <button
        type="button"
        (click)="onSubmit.emit()"
        class="btn btn-primary w-100 mt-5"
      >
        Crear cuenta
      </button>
    </form>
  </div>
</div>
