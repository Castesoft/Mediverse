<form
  class="form w-100 fv-plugins-bootstrap5 fv-plugins-framework"
  [id]="form.id"
  [formGroup]="form.formGroup"
  (ngSubmit)="onSubmit()">

  <div class="text-center mb-6">
    <h1 class="text-dark m-0">
      ¿Olvidaste tu contraseña?
    </h1>
    <div class="text-center text-gray-600 mt-4 px-10">
      Ingresa el correo asociado a tu cuenta y te enviaremos un enlace para cambiar tu contraseña.
    </div>
  </div>

  <div class="card">
    <div class="card-body">
      @if (form.formGroup.controls['email']; as email) {
        <div
          class="fv-row fv-plugins-icon-container"
          inputControl
          formControlName="email"
          [label]="'Correo'"
          [type]="'email'"
          [placeholder]="'usuario@ejemplo.com'"
          [submitted]="form.submitted"
          [errors]="{
            required: 'El correo es requerido',
            email: 'El correo no es válido'
          }"
        ></div>
      }

      <div class="d-flex flex-wrap justify-content-center pb-lg-0">
        <button
          type="submit"
          class="btn btn-lg btn-primary w-100 mt-8"
          [disabled]="isSubmitting"
        >
          @if (!isSubmitting) {
            Cambiar Contraseña
          } @else {
            <span class="spinner-border spinner-border-sm me-2"></span>
          }
        </button>
      </div>

      @if (showSuccessAlert) {
        <div alert
             class="mt-6"
             type="success"
             [addMargin]="false"
             [message]="successMessage"
             [title]="'¡Éxito!'"
             (onClose)="showSuccessAlert = false"></div>
      }

      @if (showErrorAlert) {
        <div alert
             class="mt-6"
             type="danger"
             [addMargin]="false"
             [message]="errorMessage"
             [title]="'Error'"
             (onClose)="showErrorAlert = false"></div>
      }
    </div>
  </div>

  <div class="text-gray-600 fw-normal fs-6 w-100 d-flex justify-content-center mt-5">
    ¿Ya tienes una cuenta?

    <a routerLink="/auth/sign-in" class="link-primary fw-semibold ms-2">
      Inicia sesión aquí
    </a>
  </div>
</form>
