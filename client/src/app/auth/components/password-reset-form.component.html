<form class="form w-100 fv-plugins-bootstrap5 fv-plugins-framework" novalidate="novalidate"
  [id]="form.id" [formGroup]="form.formGroup" (ngSubmit)="onSubmit()">
  <div class="text-center mb-10">
    <h1 class="text-dark mb-3">
      ¿Olvidaste tu contraseña?
    </h1>

    <div class="text-gray-400 fw-semibold fs-4">
      Ingresa tu correo para restablecer tu contraseña.
    </div>
  </div>

  @if (form.formGroup.controls['email']; as email) {
    <div
      class="fv-row mb-10 fv-plugins-icon-container"
      inputControl
      formControlName="email"
      [label]="'Correo'"
      [type]="'email'"
      [placeholder]="''"
      [submitted]="form.submitted"
      [errors]="{
        required: 'El correo es requerido',
        email: 'El correo no es válido'
      }"
      ></div>
  }


  <div class="d-flex flex-wrap justify-content-center pb-lg-0">
    <button type="submit" [attr.form]="form.id" class="btn btn-lg btn-primary fw-bold me-4">
      <span class="indicator-label">
        Enviar
      </span>
      <span class="indicator-progress">
        Por favor espere... <span class="spinner-border spinner-border-sm align-middle ms-2"></span>
      </span>
    </button>

    <a routerLink="/auth/sign-in/basic" class="btn btn-lg btn-light-primary fw-bold">Cancelar</a>
  </div>
</form>
