<form
  class="form w-100 fv-plugins-bootstrap5 fv-plugins-framework"
  novalidate="novalidate"
  [id]="id" [formGroup]="form" (ngSubmit)="onSubmit()"
>
  <div class="text-center mb-10">
    <h1 class="text-dark mb-3">Establecer nueva contraseña</h1>

    <div class="text-gray-400 fw-semibold fs-4">
      ¿Ya habías restablecido tu contraseña?

      <a routerLink="/auth/sign-in/basic" class="link-primary fw-bold">
        Inicia sesión aquí
      </a>
    </div>
  </div>

  <div
    class="mb-10 fv-row fv-plugins-icon-container"
    data-kt-password-meter="true"
  >
    <div class="mb-1">
      <div class="position-relative mb-3">
        <div
            class="fv-row mb-10 fv-plugins-icon-container"
            inputControl
            formControlName="password"
            [label]="'Contraseña'"
            [type]="'password'"
            [placeholder]="''"
            [submitted]="submitted"
            [errors]="{
                required: 'La contraseña es requerida',
                pattern: 'La contraseña debe contener una mayúscula, una minuscula, un número y un símbolo.'
            }"
            ></div>

        <span
          class="btn btn-sm btn-icon position-absolute translate-middle top-50 end-0 me-n2"
          data-kt-password-meter-control="visibility"
        >
          <i class="ki-duotone ki-eye-slash fs-2"></i>
          <i class="ki-duotone ki-eye fs-2 d-none"></i>
        </span>
      </div>

      <!-- <div
        class="d-flex align-items-center mb-3"
        data-kt-password-meter-control="highlight"
      >
        <div
          class="flex-grow-1 bg-secondary bg-active-success rounded h-5px me-2"
        ></div>
        <div
          class="flex-grow-1 bg-secondary bg-active-success rounded h-5px me-2"
        ></div>
        <div
          class="flex-grow-1 bg-secondary bg-active-success rounded h-5px me-2"
        ></div>
        <div
          class="flex-grow-1 bg-secondary bg-active-success rounded h-5px"
        ></div>
      </div> -->
    </div>
<!-- 
    <div class="text-muted">
      Usa 8 o más caracteres con una combinación de letras, números y símbolos.
    </div>
    <div
      class="fv-plugins-message-container fv-plugins-message-container--enabled invalid-feedback"
    ></div> -->
  </div>

  <div class="fv-row mb-10 fv-plugins-icon-container">
    <div
        class="fv-row mb-10 fv-plugins-icon-container"
        inputControl
        formControlName="confirm"
        [label]="'Confirmar contraseña'"
        [type]="'password'"
        [placeholder]="''"
        [submitted]="submitted"
        [errors]="{
            required: 'La confirmación de contraseña es requerida',
        }"
        ></div>
    <div
      class="fv-plugins-message-container fv-plugins-message-container--enabled invalid-feedback"
    ></div>
  </div>

  <!-- <div class="fv-row mb-10 fv-plugins-icon-container">
    <label
      class="form-check form-check-custom form-check-solid form-check-inline"
    >
      <input class="form-check-input" type="checkbox" name="toc" value="1" />
      <span class="form-check-label fw-semibold text-gray-700 fs-6">
        Estoy de acuerdo con los
        <a [routerLink]="[]" class="ms-1 link-primary">Términos y condiciones</a
        >.
      </span>
    </label>
    <div
      class="fv-plugins-message-container fv-plugins-message-container--enabled invalid-feedback"
    ></div>
  </div> -->

  <div class="text-center">
    <button
      type="submit"
      id="kt_new_password_submit"
      class="btn btn-lg btn-primary fw-bold"
    >
      <span class="indicator-label"> Enviar </span>

      <span class="indicator-progress">
        Por favor espere...
        <span class="spinner-border spinner-border-sm align-middle ms-2"></span>
      </span>
    </button>
  </div>
</form>
