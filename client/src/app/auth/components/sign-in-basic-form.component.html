{{form.group.value | json}}

<form class="form w-100 fv-plugins-bootstrap5 fv-plugins-framework" [formGroup]="form.group" (ngSubmit)="onSubmit()"
  [id]="form.id">
  <div class="text-center mb-10">
    <h1 class="text-dark mb-3">Iniciar sesión en {{ utils.title }}</h1>
    <div class="text-gray-400 fw-semibold fs-4">
      ¿Eres nuevo aquí?
      <a routerLink="/auth/sign-up" class="link-primary fw-bold">
        Crear una cuenta
      </a>
    </div>
  </div>
  <div class="fv-row mb-10 fv-plugins-icon-container" inputControl formControlName="email" [label]="'Correo'"
    [type]="'email'" [autofocus]="true" [placeholder]="'Ingrese su usuario o correo electrónico'"
    [submitted]="form.group.dirty" [errors]="{
      required: 'El nombre de usuario o el correo es requerido.',
      minlength:
        'El nombre de usuario o el correo debe tener al menos 6 caracteres.',
      maxlength:
        'El nombre de usuario o el correo no debe tener más de 255 caracteres.'
    }"></div>

  <div class="fv-row mb-5 fv-plugins-icon-container" inputControl formControlName="password" [type]="'password'"
    [label]="'Contraseña'" [autofocus]="true" [placeholder]="'Ingrese su usuario o correo electrónico'" [errors]="{
      'required': 'La contraseña es requerida',
      'minlength': 'La contraseña debe tener al menos 6 caracteres.',
      'maxlength': 'La contraseña no debe tener más de 100 caracteres.'
    }"></div>

  <a class="fs-6 link-primary" routerLink="/auth/sign-in/password-reset">¿Olvidaste tu contraseña?</a>

  <div class="text-center mt-5">
    <button type="submit" [attr.form]="form.id" class="btn btn-lg btn-primary w-100 mb-5">
      <span class="indicator-label"> Continuar </span>

      <span class="indicator-progress">
        Por favor espere...
        <span class="spinner-border spinner-border-sm align-middle ms-2"></span>
      </span>
    </button>
    <div class="text-center text-muted text-uppercase fw-bold mb-5">o</div>
    <a [routerLink]="[]" class="btn btn-flex flex-center btn-light btn-lg w-100 mb-5">
      <img alt="Logo" src="media/svg/brand-logos/google-icon.svg" class="h-20px me-3" />
      Continuar con Google
    </a>
    <a [routerLink]="[]" class="btn btn-flex flex-center btn-light btn-lg w-100 mb-5">
      <img alt="Logo" src="media/svg/brand-logos/facebook-4.svg" class="h-20px me-3" />
      Continuar con Facebook
    </a>
    <a [routerLink]="[]" class="btn btn-flex flex-center btn-light btn-lg w-100">
      <img alt="Logo" src="media/svg/brand-logos/apple-black.svg" class="theme-light-show h-20px me-3" />
      <img alt="Logo" src="media/svg/brand-logos/apple-black-dark.svg" class="theme-dark-show h-20px me-3" />
      Continuar con Apple
    </a>
  </div>
</form>
