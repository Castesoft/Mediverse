<div class="card h-100 nurse-card">
  <div class="card-body">
    <div class="d-flex justify-content-between">
      <div class="d-flex align-items-center mb-3">
        <div class="me-3">
          <div userProfilePicture [fullName]="nurse().fullName" [photoUrl]="nurse().photoUrl">
          </div>
        </div>
        <div>
          <h5 class="card-title mb-1">{{ nurse().fullName }}</h5>
          <p class="card-text text-muted mb-0">
            <i class="ki-duotone ki-user-tick fs-6 me-1"><span class="path1"></span><span
              class="path2"></span></i>
            {{ nurse().post || 'Nurse' }}
          </p>
        </div>
      </div>
      <div class="d-flex justify-content-end">
        <button class="btn btn-light-danger btn-icon btn-sm" (click)="onDelete.emit()">
          <i class="ki-duotone ki-trash fs-1">
            <span class="path1"></span>
            <span class="path2"></span>
            <span class="path3"></span>
            <span class="path4"></span>
            <span class="path5"></span>
          </i></button>
      </div>
    </div>
    <ul class="list-unstyled">
      <li class="mb-2">
        <i class="ki-duotone ki-sms fs-6 me-2">
          <span class="path1"></span>
          <span class="path2"></span>
        </i>
        {{ nurse().email }}
      </li>
      <li class="mb-2">
        <i class="ki-duotone ki-phone fs-6 me-2">
          <span class="path1"></span>
          <span class="path2"></span>
          <span class="path3"></span>
          <span class="path4"></span>
          <span class="path5"></span>
        </i>
        {{ nurse().phoneNumber || 'N/A' }}
      </li>
      <li>
        <i class="ki-duotone ki-award fs-6 me-2">
          <span class="path1"></span>
          <span class="path2"></span>
          <span class="path3"></span>
        </i>
        {{ nurse().education || 'N/A' }}
      </li>
    </ul>
  </div>
</div>
