<div class="card">
  @if (title()) {
    <div class="card-header">
      <div class="fs-2 fw-bold text-gray-900">{{ title() }}</div>
    </div>
  }
  <div class="card-body p-5">
    <div class="d-flex flex-grow-1 justify-content-start align-items-center">
      <a [routerLink]="'/home'" class="symbol symbol-50px symbol-circle">
        <img [src]="item().photoUrl" alt=""/>
      </a>
      <div class="ms-4 w-100">
        <div class="d-flex flex-grow-1 justify-content-between align-items-center">
          <div class="d-flex flex-grow-1 justify-content-between align-items-center mb-2">
            <div>
              <div class="fw-bold fs-4">
                {{ item().fullName }}
              </div>
              <div>
                {{ item().sex }}
              </div>
            </div>
          </div>
          <div>
            <button class="btn btn-sm btn-light-secondary me-4">
              <fa-icon [icon]="faEye"></fa-icon>
            </button>
            <button class="btn  btn-sm btn-light-primary">
              <fa-icon [icon]="icons.faPencil"></fa-icon>
            </button>
          </div>
        </div>

      </div>
      <br/>
    </div>
  </div>
</div>
