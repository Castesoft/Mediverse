<div class="card">
  <div class="card-header">
    <div class="card-title">
      <h3>Método de Pago</h3>
    </div>
    <div class="d-flex flex-column align-items-center justify-content-center">
      @if (selectedPaymentMethod) {
        <button type="button" class="btn btn-light-primary btn-sm" (click)="togglePaymentMethodChange()">
          Cambiar
        </button>
      }
    </div>
  </div>

  @if (isLoading) {
    <div class="card-body border-top">
      <div class="d-flex justify-content-center py-3">
        <div class="spinner-border text-gray-400" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
      </div>
    </div>
  } @else {
    <div [collapse]="displayCollapsed" [isAnimated]="true" (collapsed)="onDisplayHidden()">
      <div class="card-body border-top border-gray-200">
        @if (selectedPaymentMethod) {
          <div paymentMethodDisplayCard
               [paymentMethod]="selectedPaymentMethod"
               [selected]="true"
               [displayOnly]="true"
               [selectionMode]="false">
          </div>
        }
      </div>
    </div>

    <div [collapse]="selectorCollapsed" [isAnimated]="true" (collapsed)="onSelectorHidden()">
      <div class="card-body pt-0">
        <div paymentMethodSelector
             [paymentMethods]="paymentMethods"
             [confirmOnSelect]="true"
             [showPaymentMethodCreateCard]="true"
             (selectedPaymentMethod)="onPaymentMethodSelected($event)">
        </div>
      </div>
    </div>
  }
</div>
