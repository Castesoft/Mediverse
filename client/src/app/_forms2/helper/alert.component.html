<div class="d-flex flex-row justify-content-start align-items-start">
  <div class="d-flex flex-column">
    <div class="d-flex flex-row align-items-center mb-1">
      <i [ngClass]="'ki-duotone ki-message-text-2 fs-6 text-' + type() + ' me-2 mb-5 mb-sm-0'">
        <span class="path1"></span>
        <span class="path2"></span>
        <span class="path3"></span>
      </i>
      <h5 class="m-0" [ngClass]="'text-' + type()">
        {{ title() }}
      </h5>
    </div>

    <div [ngClass]="'text-' + type()">
      {{ message() }}
    </div>
  </div>
</div>
<button
  [ngClass]="'btn p-1 text-' + type() + ' d-flex'"
  type="button"
  aria-label="Close"
  (click)="onClose.emit()"
  style="margin-top: -0.475rem;">
  <fa-icon [icon]="icons.faTimes" class="fs--1"></fa-icon>
</button>
