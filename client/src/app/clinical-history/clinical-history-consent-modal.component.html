<div class="card">
  <div class="card-body text-center">
    <div>
      <p class="fs-3">
        {{ bodyText }}
      </p>
    </div>
    <div class="d-flex w-100 justify-content-between mt-6">
      <button class="btn btn-color-muted btn-active-color-primary px-0 btn-sm" (click)="onCancel()">No, Cancelar
      </button>
      <button class="btn btn-primary btn-sm" (click)="onConfirm()">Si, Confirmar</button>
    </div>
  </div>
</div>
