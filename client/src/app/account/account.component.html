<div class="d-flex flex-column flex-root h-100">
  <mat-sidenav-container class="page d-flex flex-row flex-column-fluid" autosize
                         style="background-color: transparent; overflow: unset !important;">
    <mat-sidenav
      #snav
      class="aside aside-default aside-hoverable"
      [mode]="query.isMobile() ? 'over' : 'side'"
      [(opened)]="sidebar.opened"
      style="display: flex!important;"
      [fixedInViewport]="query.isMobile()"
    >
      <div mainAside></div>
    </mat-sidenav>

    <div wrapper>
      <header header [class.shadow]="scrollService.isScrolled() === true" [ngStyle]="headerStyles"
              style="z-index: 999999999999999 !important"></header>
      <div content [style.margin-top.px]="scrollService.isScrolled() === true ? scrollService.scrollThreshold : 0">
        <div toolbar>
          <div toolbarContainer>
            <div toolbarInfo>
              <h1 toolbarTitle [title]="'Mi Cuenta'"></h1>
              <ul breadcrumb>
                <li breadcrumbLink [label]="'Inicio'" [url]="'/'"></li>
                <li breadcrumbLink [label]="'Cuenta'" [url]="'/cuenta'"></li>
                @if (label) {
                  <li breadcrumbLink [label]="label" [active]="true">{{ label }}</li>
                }
              </ul>
            </div>
            <div toolbarActions></div>
          </div>
        </div>
        <div post>
          @if (account && label !== "Configuración") {
            <div card>
              <div accountCard [account]="account"></div>
            </div>
          }
          <router-outlet></router-outlet>
        </div>
      </div>
      <div footer></div>
    </div>
  </mat-sidenav-container>
</div>
