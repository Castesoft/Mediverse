<div errorsAlert3 [(error)]="form.error"></div>

<form [id]="form.id" (ngSubmit)="onSubmit()">

  <div formBuilder3 [cols]="1" [gap]="6" [controls]="[
    form.controls.specialty,
    form.controls.licenseNumber,
    form.controls.specialtyLicense,
  ]"></div>

@if(
  use() === 'edit' &&
  item() !== null &&
  item()!.document !== null
) {
    <div insuranceDocumentItem [(item)]="item()!.document"></div>
  }@else{
    <div formBuilder3 [cols]="1" [gap]="6" [controls]="[
    form.controls.file,
  ]"></div>
  }

  <div formBuilder3 [cols]="1" [gap]="6" [controls]="[
    form.controls.isMain,
  ]"></div>

  <div class="text-center pt-15">
    <button type="reset" class="btn btn-light me-3" (click)="{}" [disabled]="form.submitted">
      Cancelar
    </button>
    <button type="submit" class="btn btn-primary" [attr.form]="form.id" style="width: 96px;"
      [disabled]="form.submitted">
      @if (!form.loading) {
      <span class="indicator-label">Guardar</span>
      } @else {
      <span class="spinner-border spinner-border-sm align-middle"></span>
      }
    </button>
  </div>

</form>
