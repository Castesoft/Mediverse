<div class="card">
  @if (title) {
    <div class="card-header">
      <div class="card-title">
        <h2>{{ title }}</h2>
      </div>
    </div>
  }
  <div class="card-body pt-0">
    <form [formGroup]="addressForm" (ngSubmit)="onSubmit()">
      <div addressForm [formGroup]="addressForm" [solicitName]="true"></div>

      <div class="d-flex flex-stack">
        <div class="me-4">
          <label class="fs-6 fw-semibold form-label">¿Guardar como dirección principal?</label>
        </div>
        <label class="form-check form-switch form-check-custom form-check-solid">
          <input class="form-check-input" type="checkbox" formControlName="IsDefault"/>
        </label>
      </div>

      <div class="d-flex flex-stack mt-2">
        <div class="me-4">
          <label class="fs-6 fw-semibold form-label">¿Guardar como dirección de facturación?</label>
        </div>
        <label class="form-check form-switch form-check-custom form-check-solid">
          <input class="form-check-input" type="checkbox" formControlName="IsBilling"/>
        </label>
      </div>

      <div class="d-flex flex-grow-1 justify-content-between mt-8">
        <button type="button" class="btn btn-light me-3" (click)="onCancel()" [disabled]="submitted">
          Cancel
        </button>
        <button type="submit" class="btn btn-primary">
          @if (!submitted) {
            <span class="indicator-label">Guardar</span>
          } @else {
            <span class="spinner-border spinner-border-sm align-middle ms-2"></span>
          }
        </button>
      </div>
    </form>
  </div>
</div>
