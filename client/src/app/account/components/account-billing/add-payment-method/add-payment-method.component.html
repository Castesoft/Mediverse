<div class="card">
  @if (title) {
    <div class="card-header">
      <div class="card-title">
        <h3>{{ title }}</h3>
      </div>
    </div>
  }

  <div class="card-body pt-0">
    <form [formGroup]="paymentMethodForm" (ngSubmit)="onSubmit()">
      <div
        class="fv-row mb-4 fv-plugins-icon-container"
        inputControl
        formControlName="DisplayName"
        [label]="'Nombre en la tarjeta'"
        [type]="'text'"
        [placeholder]="''"
        [submitted]="submitted"
        [errors]="{
                required: 'El nombre es requerido.'
            }"
      ></div>

      <div class="row g-8">
        <div class="col-6">
          <label class="fw-semibold fs-6 required">Número de tarjeta</label>
          <div class="form-control" #cardNumber></div>
        </div>
        <div class="col-3">
          <label class="fw-semibold fs-6 required">Expiración</label>
          <div class="form-control" #cardExpiry></div>
        </div>
        <div class="col-3">
          <label class="fw-semibold fs-6 required">CVC</label>
          <div class="form-control" #cardCvc></div>
        </div>
        @if (cardErrors) {
          <span class="text-danger">{{ cardErrors }}</span>
        }
      </div>

      <div class="d-flex flex-stack mt-8">
        <div class="me-4">
          <label class="fs-6 fw-semibold form-label">¿Guardar como método de pago principal?</label>
        </div>
        <label class="form-check form-switch form-check-custom form-check-solid">
          <input class="form-check-input" type="checkbox" formControlName="IsMain"/>
        </label>
      </div>

      <div class="d-flex flex-grow-1 justify-content-between mt-8">
        <button
          type="reset"
          class="btn btn-light me-3"
          (click)="bsModalRef.hide()"
          [disabled]="submitted"
        >
          Cancelar
        </button>
        <button
          type="submit" class="btn btn-primary"
          [disabled]="submitted"
        >
          @if (!submitted) {
            <span class="indicator-label">Guardar</span>
          } @else {
            <span class="spinner-border spinner-border-sm align-middle ms-2"></span>
          }
        </button>
      </div>
    </form>
  </div>
</div>
