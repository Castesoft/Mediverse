<div card id="account_settings_notifications" (mouseenter)="selectSection('account_settings_notifications')">
    <div cardHeader>
      <div cardTitle [title]="'Notificaciones'"></div>
    </div>
    <div cardBody>
      <div class="table-responsive">
        <table
          class="table table-row-dashed border-gray-300 align-middle gy-6"
        >
          <tbody class="fs-6 fw-semibold">
            <tr>
              <td class="min-w-250px fs-4 fw-bold">Notifications</td>
              <td class="w-125px">
                <div class="form-check form-check-custom form-check-solid">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    value=""
                    id="kt_settings_notification_email"
                    checked="checked"
                  />
                  <label
                    class="form-check-label ps-2"
                    for="kt_settings_notification_email"
                    >Email</label
                  >
                </div>
              </td>
              <td class="w-125px">
                <div class="form-check form-check-custom form-check-solid">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    value=""
                    id="kt_settings_notification_phone"
                    checked="checked"
                  />
                  <label
                    class="form-check-label ps-2"
                    for="kt_settings_notification_phone"
                    >Phone</label
                  >
                </div>
              </td>
            </tr>
            <tr>
              <td>Billing Updates</td>
              <td>
                <div class="form-check form-check-custom form-check-solid">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    value="1"
                    id="billing1"
                    checked="checked"
                  />
                  <label class="form-check-label ps-2" for="billing1"></label>
                </div>
              </td>
              <td>
                <div class="form-check form-check-custom form-check-solid">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    value=""
                    id="billing2"
                    checked="checked"
                  />
                  <label class="form-check-label ps-2" for="billing2"></label>
                </div>
              </td>
            </tr>
            <tr>
              <td>New Team Members</td>
              <td>
                <div class="form-check form-check-custom form-check-solid">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    value=""
                    id="team1"
                    checked="checked"
                  />
                  <label class="form-check-label ps-2" for="team1"></label>
                </div>
              </td>
              <td>
                <div class="form-check form-check-custom form-check-solid">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    value=""
                    id="team2"
                  />
                  <label class="form-check-label ps-2" for="team2"></label>
                </div>
              </td>
            </tr>
            <tr>
              <td>Completed Projects</td>
              <td>
                <div class="form-check form-check-custom form-check-solid">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    value=""
                    id="project1"
                  />
                  <label class="form-check-label ps-2" for="project1"></label>
                </div>
              </td>
              <td>
                <div class="form-check form-check-custom form-check-solid">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    value=""
                    id="project2"
                    checked="checked"
                  />
                  <label class="form-check-label ps-2" for="project2"></label>
                </div>
              </td>
            </tr>
            <tr>
              <td class="border-bottom-0">Newsletters</td>
              <td class="border-bottom-0">
                <div class="form-check form-check-custom form-check-solid">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    value=""
                    id="newsletter1"
                  />
                  <label
                    class="form-check-label ps-2"
                    for="newsletter1"
                  ></label>
                </div>
              </td>
              <td class="border-bottom-0">
                <div class="form-check form-check-custom form-check-solid">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    value=""
                    id="newsletter2"
                  />
                  <label
                    class="form-check-label ps-2"
                    for="newsletter2"
                  ></label>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
    <div cardFooter>
      <button
        type="reset"
        class="btn btn-light btn-active-light-primary me-2"
      >
        Cancelar
      </button>
      <button
        type="submit"
        class="btn btn-primary"
        id="kt_account_profile_details_submit"
      >
        Guardar cambios
      </button>
    </div>
  </div>
