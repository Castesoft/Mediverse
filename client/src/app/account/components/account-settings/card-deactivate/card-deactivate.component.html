<div card id="account_settings_deactivate" (mouseenter)="selectSection('account_settings_deactivate')">
    <div cardHeader>
      <div cardTitle [title]="'Desactivar cuenta'"></div>
    </div>
    <div cardBody>
      <div
        class="notice d-flex bg-light-warning rounded border-warning border border-dashed mb-9 p-6"
      >
        <i class="ki-duotone ki-information fs-2tx text-warning me-4">
          <span class="path1"></span>
          <span class="path2"></span>
          <span class="path3"></span>
        </i>
        <div class="d-flex flex-stack flex-grow-1">
          <div class="fw-semibold">
            <h4 class="text-gray-900 fw-bold">
              You Are Deactivating Your Account
            </h4>
            <div class="fs-6 text-gray-700">
              For extra security, this requires you to confirm your email or
              phone number when you reset yousignr password.
              <br />
              <a class="fw-bold" href="#">Learn more</a>
            </div>
          </div>
        </div>
      </div>
      <div
        class="form-check form-check-solid fv-row fv-plugins-icon-container"
      >
        <input
          name="deactivate"
          class="form-check-input"
          type="checkbox"
          value=""
          id="deactivate"
        />
        <label class="form-check-label fw-semibold ps-2 fs-6" for="deactivate"
          >I confirm my account deactivation</label
        >
        <div
          class="fv-plugins-message-container fv-plugins-message-container--enabled invalid-feedback"
        ></div>
      </div>
    </div>
    <div cardFooter>
      <button
        id="kt_account_deactivate_account_submit"
        type="submit"
        class="btn btn-danger fw-semibold"
      >
        Desactivar cuenta
      </button>
    </div>
  </div>
