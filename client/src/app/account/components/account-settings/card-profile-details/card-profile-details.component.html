<div card id="account_settings_profile_details" (mouseenter)="selectSection('account_settings_profile_details')">
    <div cardHeader>
      <div cardTitle [title]="'Detalles de perfil'"></div>
    </div>
    <form [formGroup]="profileDetailsForm" (ngSubmit)="onSubmit()">
      <div cardBody>
        <div class="row mb-6">
          <label class="col-lg-4 col-form-label fw-semibold fs-6">Avatar</label>
          <div class="col-lg-8">
            <div class="image-input image-input-outline" style="background-image: url('media/svg/avatars/blank.svg')">
              <div class=" w-125px h-125px" >
                @if (photoUrl) {
                  <img [src]="photoUrl" class="mw-100 mh-100 rounded" alt="photo" />
                } @else {
                  <app-user-profile-picture
                    [firstName]="userForProfilePicture.firstName"
                    [photoUrl]="userForProfilePicture.photoUrl ?? ''"
                    shape="square" size="md2"
                  ></app-user-profile-picture>
                }
              </div>
              <label class="btn btn-icon btn-circle btn-active-color-primary w-25px h-25px bg-body shadow" data-kt-image-input-action="change" data-bs-toggle="tooltip" title="Change avatar">
                <i class="ki-duotone ki-pencil fs-7">
                  <span class="path1"></span>
                  <span class="path2"></span>
                </i>
                <input aria-label="hola" type="file" name="avatar" accept=".png, .jpg, .jpeg" (change)="onPhotoChange($event)" />
                <input type="hidden" name="avatar_remove" />
              </label>
              <span class="btn btn-icon btn-circle btn-active-color-primary w-25px h-25px bg-body shadow" data-kt-image-input-action="cancel" data-bs-toggle="tooltip" title="Cancel avatar">
                <i class="ki-duotone ki-cross fs-2">
                  <span class="path1"></span>
                  <span class="path2"></span>
                </i>
              </span>
              <span class="btn btn-icon btn-circle btn-active-color-primary w-25px h-25px bg-body shadow" data-kt-image-input-action="remove"
                data-bs-toggle="tooltip" title="Remove avatar" (click)="removeAvatar()">
                <i class="ki-duotone ki-cross fs-2">
                  <span class="path1"></span>
                  <span class="path2"></span>
                </i>
              </span>
            </div>
            <div class="form-text mt-5">Tipos de archivos permitidos: png, jpg, jpeg.</div>
          </div>
        </div>

        <div class="row mb-6">
          <label class="col-lg-4 col-form-label fw-semibold fs-6"
            >Nombre completo</label
          >
          <div class="col-lg-8">
            <div class="row">
              <div class="col-lg-6 fv-row fv-plugins-icon-container">
                <div
                  class="fv-row fv-plugins-icon-container"
                  inputControl
                  formControlName="FirstName"
                  type="text"
                  [placeholder]="''"
                  [submitted]="submitted"
                  [errors]="{
                      required: 'Los nombres son requeridos.'
                  }"
                ></div>
                <div
                  class="fv-plugins-message-container fv-plugins-message-container--enabled invalid-feedback"
                ></div>
              </div>
              <div class="col-lg-6 fv-row fv-plugins-icon-container">
                <div
                  class="fv-row fv-plugins-icon-container"
                  inputControl
                  formControlName="LastName"
                  type="text"
                  [placeholder]="''"
                  [submitted]="submitted"
                  [errors]="{
                      required: 'Los apellidos son requeridos.'
                  }"
                ></div>
                <div
                  class="fv-plugins-message-container fv-plugins-message-container--enabled invalid-feedback"
                ></div>
              </div>
            </div>
          </div>
        </div>

        <div class="row mb-6">
          <label class="col-lg-4 col-form-label fw-semibold fs-6">
            <span class="">Teléfono de contacto</span>
          </label>
          <div class="col-lg-8 fv-row fv-plugins-icon-container">
            <div
                class="fv-row fv-plugins-icon-container"
                inputControl
                formControlName="PhoneNumber"
                type="tel"
                [placeholder]="''"
                [submitted]="submitted"
                [errors]="{
                    required: 'El teléfono es requerido.'
                }"
              ></div>
            <div
              class="fv-plugins-message-container fv-plugins-message-container--enabled invalid-feedback"
            ></div>
          </div>
        </div>

        @if (accountService.hasRole(['Doctor'])) {
          <div class="row mb-6">
            <label class="col-lg-4 col-form-label fw-semibold fs-6">
              <span class="">Cédula profesional</span>
            </label>
            <div class="col-lg-8 fv-row fv-plugins-icon-container">
              <div
                  class="fv-row fv-plugins-icon-container"
                  inputControl
                  formControlName="LicenseNumber"
                  type="text"
                  [placeholder]="''"
                  [submitted]="submitted"
                ></div>
              <div
                class="fv-plugins-message-container fv-plugins-message-container--enabled invalid-feedback"
              ></div>
            </div>
          </div>
          <div class="row mb-6">
            <label class="col-lg-4 col-form-label fw-semibold fs-6">
              <span class="">Cédula de especialidad</span>
            </label>
            <div class="col-lg-8 fv-row fv-plugins-icon-container">
              <div
                  class="fv-row fv-plugins-icon-container"
                  inputControl
                  formControlName="SpecialtyLicense"
                  type="text"
                  [placeholder]="''"
                  [submitted]="submitted"
                ></div>
              <div
                class="fv-plugins-message-container fv-plugins-message-container--enabled invalid-feedback"
              ></div>
            </div>
          </div>

          <div class="row mb-6">
            <label class="col-lg-4 col-form-label fw-semibold fs-6"
              >Especialidad</label
            >
            <div class="col-lg-8 fv-row fv-plugins-icon-container">
              <div
                  class="fv-row fv-plugins-icon-container"
                  controlSelect
                  formControlName="SpecialtyId"
                  [options]="specialties"
                  [placeholder]="''"
                  [submitted]="submitted"
                  [errors]="{
                      required: 'La especialidad es requerida.'
                  }"
                ></div>
            </div>
          </div>

          <!-- <div class="row mb-6">
            <label class="col-lg-4 col-form-label fw-semibold fs-6"
              >Subespecialidad</label
            >
            <div class="col-lg-8 fv-row fv-plugins-icon-container">
              <div
                  class="fv-row fv-plugins-icon-container"
                  controlSelect
                  formControlName="subspecialtyId"
                  [options]="['Subespecialidad1', 'Subespecialidad2', 'Subespecialidad3']"
                  [placeholder]="''"
                  [submitted]="submitted"
                  [errors]="{
                      required: 'La subespecialidad es requerida.'
                  }"
                ></div>
            </div>
          </div> -->

          <div class="row mb-6">
            <label class="col-lg-4 col-form-label fw-semibold fs-6"
              >Cédula/Certificación</label
            >
            <div class="col-lg-8 fv-row fv-plugins-icon-container">
              <div
                  class="fv-row fv-plugins-icon-container"
                  inputControl
                  formControlName="file"
                  type="file"
                  [placeholder]="''"
                  [submitted]="submitted"
                  [errors]="{
                      required: 'Al actualizar la especialidad se requiere la cédula o certificación correspondiente.'
                  }"
                  (onChange)="onFileChange($event)"
                ></div>
            </div>
          </div>

          <div class="row mb-6">
            <label class="col-lg-4 col-form-label fw-semibold fs-6"
              >Métodos de pago aceptados</label
            >
            <div class="col-lg-8 fv-row fv-plugins-icon-container">
              <div
                class="fv-row mb-5 fv-plugins-icon-container"
                controlCheckList
                formControlName="AcceptedPaymentMethods"
                [options]="paymentMethodTypes"
                [submitted]="submitted"
                [errors]="{
                    required: 'Selecciona al menos un método de pago.'
                }"
              ></div>
              @if (showRequireAnticipatedCardPaymentsField()) {
                <div class="d-flex flex-stack mt-5 align-items-center">
                  <div class="me-5">
                      <div class="fs-6 fw-semibold">Requerir pago anticipado para citas con tarjeta de crédito/débito</div>
                  </div>
                  <label class="form-check form-switch form-check-custom form-check-solid">
                      <input class="form-check-input" type="checkbox" [checked]="accountService.current()!.requireAnticipatedCardPayments" (change)="setValueAnticipatedCardPayments($event)" />
                  </label>
                </div>
              }
            </div>
          </div>
        }
      </div>

      <div cardFooter>
        <button
          type="button"
          class="btn btn-light btn-active-light-primary me-2"
          (click)="onCancel()"
        >
          Cancelar
        </button>
        <button
          type="submit"
          class="btn btn-primary"
          id="kt_account_profile_details_submit"
        >
          Guardar cambios
        </button>
      </div>

    </form>
  </div>
