<div modalContent>
  <div modalHeader [title]="'Encuesta de Satisfacción'"></div>
  <div modalBody>
    <form [formGroup]="surveyForm" (ngSubmit)="onSubmit()">
      <div class="fv-row mb-5 fv-plugins-icon-container">
        
        <label class="form-label">¿Cómo calificaría su experiencia con {{ satisfactionSurvey?.doctorName }}?</label>
        <div class="rating-container d-flex justify-content-center">
          <div class="rating">
            @for (star of [1, 2, 3, 4, 5]; track star) {
              <span 
                class="btn btn-icon btn-sm btn-light-primary me-3 mb-3"
                (click)="rateExperience(star)"
                [class.active]="star <= (surveyForm.get('rating')?.value || 0)"
              >
                <i class="ki-duotone ki-star fs-2">
                  <span class="path1"></span>
                  <span class="path2"></span>
                </i>
              </span>
            }
          </div>
        </div>
        @if (submitted && surveyForm.get('rating')?.hasError('required')) {
          <div class="invalid-feedback">La calificación es requerida.</div>
        }
      </div>

      <div class="fv-row fv-plugins-icon-container">
        <div controlCheck formControlName="isServiceRecommended">
            <span class="form-check-label fw-semibold text-gray-700 fs-6">¿Recomendaría el servicio "{{ satisfactionSurvey?.serviceName }}" a sus amigos o familiares?</span>
        </div>
      </div>

      <div
        class="fv-row mb-5 fv-plugins-icon-container"
        controlTextarea
        formControlName="comment"
        [label]="'Comentarios adicionales'"
        [placeholder]="'Comparta sus comentarios aquí'"
        [submitted]="submitted"
        [errors]="{
          maxlength: 'El comentario no puede exceder 500 caracteres.'
        }"
        [rows]="4"
      ></div>

      <div class="text-center pt-15">
        <button 
          type="button" class="btn btn-light me-3" 
          (click)="skip()" [disabled]="loading"
        >
          Omitir
        </button>
        <button 
          type="submit" class="btn btn-primary" 
          style="width: 96px;" [disabled]="loading"
        >
          @if (!loading) {
            <span class="indicator-label">Enviar</span>
          } @else {
            <span class="spinner-border spinner-border-sm align-middle ms-2"></span>
          }
        </button>
      </div>
    </form>
  </div>
</div>
