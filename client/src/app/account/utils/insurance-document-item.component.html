<div class="table align-middle table-row-dashed fs-6 gy-5 dataTable no-footer">
  <table class="table align-middle table-row-dashed fs-6 gy-5 dataTable no-footer">
    <thead>
      <tr class="text-start text-gray-400 fw-bold fs-7 text-uppercase gs-0">
        <th class="min-w-250px sorting_disabled" rowspan="1" colspan="1">Nombre</th>
        <th class="min-w-10px sorting_disabled" rowspan="1" colspan="1">Tamaño</th>
        <th class="w-125px sorting_disabled" rowspan="1" colspan="1"></th>
      </tr>
    </thead>
    <tbody class="fw-semibold text-gray-600">
      <tr class="odd">
        <td>
          <div class="d-flex align-items-center">
            <i class="ki-duotone ki-files fs-2x text-primary me-4"></i>
            <a [href]="item().url" target="_blank" class="text-gray-800 text-hover-primary">{{item().name}}</a>
          </div>
        </td>
        <td class="text-nowrap">
          @if(item().size !== null) {
          {{item().size! | fileSize}}
          }
        </td>
        <td class="text-end">
          <div class="d-flex justify-content-end">
            <div class="ms-2" >
              <button type="button" class="btn btn-sm btn-icon btn-light btn-active-light-primary" (click)="onClickDelete()">
                <i class="ki-duotone ki-fasten fs-5 m-0"><span class="path1"></span><span class="path2"></span></i>
              </button>
            </div>
          </div>
        </td>
      </tr>
    </tbody>
  </table>
</div>
