<div class="toolbar" id="kt_toolbar">
    <div class="container-fluid d-flex flex-stack flex-wrap flex-sm-nowrap">
      <div
        class="d-flex flex-column align-items-start justify-content-center flex-wrap me-2"
      >
        <h1 class="text-gray-900 fw-bold my-1 fs-2">
          Recetas
          <small class="text-muted fs-6 fw-normal ms-1"></small>
        </h1>
        <ul class="breadcrumb fw-semibold fs-base my-1">
          <li class="breadcrumb-item text-muted">
            <a [routerLink]="'../../'" class="text-muted text-hover-primary"
              >Dashboard</a
            >
          </li>
          <li class="breadcrumb-item text-muted">
            <a [routerLink]="'../'" class="text-muted text-hover-primary"
              >Recetas</a
            >
          </li>
          <li class="breadcrumb-item text-muted">Agregar</li>
        </ul>
      </div>
    </div>
  </div>
  
  <form [formGroup]="formGroup" (ngSubmit)="onSubmit()" id="patientForm">
    <div class="container-fluid">
      <div class="card">
        <div class="card-body">
          <div class="row row-cols-1 row-cols-md-2">
            <div
              controlDate
              formControlName="date"
              class="col"
              [label]="'Fecha'"
            ></div>
          </div>
        </div>
      </div>
    </div>
  </form>
  
  <button class="btn btn-light-primary" type="submit" form="patientForm">
    <i class="ki-duotone ki-filter">
      <span class="path1"></span>
      <span class="path2"></span>
    </i>
    Confirmar
  </button>
