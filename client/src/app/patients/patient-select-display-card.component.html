@if (item()) {
  @if (title()) {
    <div class="card-header">
      <div class="fs-2 fw-bold text-gray-900">{{ title() }}</div>
    </div>
  }
  <div class="card-body p-3 pb-0">
    <div class="d-flex flex-grow-1 justify-content-start align-items-center">
      <a [routerLink]="'/home/patients/' + item()!.id"
         class="symbol symbol-50px symbol-circle">
        <div userProfilePicture [fullName]="item()!.fullName" [photoUrl]="item()!.photoUrl"></div>
      </a>
      <div class="ms-4 w-100">
        <div class="d-flex flex-grow-1 justify-content-between align-items-center">
          <div class="d-flex flex-grow-1 justify-content-between align-items-center mb-2">
            <div [class.d-flex]="inline()" [class.gap-4]="inline()" [class.align-items-center]="inline()">
              <div class="fw-bold fs-6">
                {{ item()!.fullName }}
              </div>
              <div class="fs-6">
                {{ item()!.sex }} <span class="text-gray-300">|</span> {{ item()!.age }} años
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
}
