<div
  class="d-flex flex-grow-1 w-full justify-content-between align-items-center schedule-item ps-4 mt-4"
>
  <div class="d-flex flex-wrap flex-column justify-content-start">
    <p class="mb-1" [style.font-size]="'12px'">
      {{ startingHour }} - {{ endingHour }}
    </p>
    <p class="fw-bold mb-0">{{ appointment.kind }}</p>
    <p class="mb-0" [style.font-size]="'12px'">
      <span class="text-gray-500">Consulta con </span>
      <span class="text-primary">{{ appointment.doctor.name }}</span>
    </p>
  </div>
  <div>
    <a
      class="btn btn-sm btn-light-secondary"
      [routerLink]="['../../appointments', appointment.id]"
      >Ver</a
    >
  </div>
</div>
