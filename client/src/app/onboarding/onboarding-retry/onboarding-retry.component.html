<div class="text-center">
  <div class="mb-10">
    <i class="ki-duotone ki-cross-circle text-danger" style="font-size: 8rem">
      <span class="path1"></span>
      <span class="path2"></span>
    </i>
  </div>

  <div class="fs-2x fw-bold text-gray-800 mb-5">
    Hubo un problema con la conexión a Stripe
  </div>

  <div class="fs-6 text-gray-600 mb-10 mw-500px">
    No se pudo completar el proceso de registro de tu cuenta de Stripe. Por favor,
    intenta nuevamente para poder recibir pagos de tus pacientes.
  </div>

  <div class="d-flex flex-row gap-3 justify-content-center">
    <a class="btn btn-light btn-lg px-8" routerLink="/cuenta">
      Volver a Mi Cuenta
    </a>

    <button class="btn btn-primary" (click)="retryOnboardingProcess()" [disabled]="isLoading">
      <div class="d-flex nowrap gap-2 align-items-center">
        <div>
          Reintentar conexión con Stripe
        </div>
        <div class="fw-bold fs-6">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
               class="bi bi-box-arrow-up-right" viewBox="0 0 16 16">
            <path fill-rule="evenodd"
                  d="M8.636 3.5a.5.5 0 0 0-.5-.5H1.5A1.5 1.5 0 0 0 0 4.5v10A1.5 1.5 0 0 0 1.5 16h10a1.5 1.5 0 0 0 1.5-1.5V7.864a.5.5 0 0 0-1 0V14.5a.5.5 0 0 1-.5.5h-10a.5.5 0 0 1-.5-.5v-10a.5.5 0 0 1 .5-.5h6.636a.5.5 0 0 0 .5-.5"/>
            <path fill-rule="evenodd"
                  d="M16 .5a.5.5 0 0 0-.5-.5h-5a.5.5 0 0 0 0 1h3.793L6.146 9.146a.5.5 0 1 0 .708.708L15 1.707V5.5a.5.5 0 0 0 1 0z"/>
          </svg>
        </div>
      </div>
    </button>
  </div>
</div>
