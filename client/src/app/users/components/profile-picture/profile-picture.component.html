<div [class]="symbolClasses()" role="img" [attr.aria-label]="fullName() || 'User profile'">
  @if (photoUrl() && hasValidFullName()) {
    <img [src]="photoUrl()" [alt]="fullName()" class="w-100"/>
  } @else if (fullName()) {
    <div [class]="labelClasses()">
      {{ getInitial() }}
    </div>
  }

  @if (showOnline()) {
    <div class="online-indicator" aria-hidden="true"></div>
  }
</div>
