<thead
  tableHeader
  [(columns)]="service.columns"
  [(dictionary)]="service.dictionary"
  [(params)]="params"
  [(mode)]="mode"
  [(isCompact)]="isCompact"
  (selectedChange)="service.toggleMultipleSelectedArray$(key() || '', data())"
></thead>
<tbody templateTableBody>
  @for (item of data(); track item) {
    <tr
      class="hover-actions-trigger btn-reveal-trigger position-static"
      [cdkContextMenuTriggerFor]="context_menu"
    >
      <td
        tableCheckCell
        [isCompact]="isCompact()"
        [isChecked]="item.isSelected"
        (click)="service.setSelected$(key() || '', item)"
      ></td>

      @if (dev.isDev()) {
        <td
          class="name align-middle white-space-nowrap px-0 py-0"
          [ngStyle]="isCompact() ? {} : { cursor: 'pointer' }"
        >
          <div class="d-flex align-items-center justify-content-start px-0">
            <a
              [routerLink]="[service.dictionary.catalogRoute, item.id]"
              [href]="[service.dictionary.catalogRoute, item.id]"
              class="fw-semibold text-primary"
            >#{{ item.id | number }}</a
            >
          </div>
        </td>
      }

      <td class="fw-bold">{{ item.subscriptionPlanName }}</td>
      <td>{{ item.subscriptionStartDate | date:'dd/MM/yyyy' }}</td>
      <td>{{ item.nextBillingDate | date:'dd/MM/yyyy' }}</td>
      <td>
        <span class="badge badge-secondary badge-sm">
          {{ item.stripeSubscriptionId }}
        </span>
      </td>
      <td subscriptionStatusCell [status]="item.status"></td>

      <td
        tableMenuCell
        [item]="item"
        [contextMenu]="context_menu"
        [(isCompact)]="isCompact"
      ></td>
      <ng-template #context_menu>
        @defer {
          @if (key()) {
            <div tableMenu
                 [siteSection]="params().fromSection || undefined"
                 [item]="item"
                 [key]="key()!"
                 [service]="service"></div>
          }
        }
      </ng-template>
    </tr>
  }
</tbody>
