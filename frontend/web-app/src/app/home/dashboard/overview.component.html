<div class="toolbar" id="kt_toolbar">
  <div class="container-fluid d-flex flex-stack flex-wrap flex-sm-nowrap">
    <div
      class="d-flex flex-column align-items-start justify-content-center flex-wrap me-2"
    >
      <h1 class="text-gray-900 fw-bold my-1 fs-2">
        Inicio
        <small class="text-muted fs-6 fw-normal ms-1"></small>
      </h1>
      <ul class="breadcrumb fw-semibold fs-base my-1">
        <li class="breadcrumb-item text-muted">
          <a href="index.html" class="text-muted text-hover-primary"
            >Dashboard</a
          >
        </li>
        <li class="breadcrumb-item text-muted">Inicio</li>
      </ul>
    </div>
  </div>
</div>

<div class="post fs-6 d-flex flex-column-fluid" id="kt_post">
  <div class="container-xxl">
    <div class="row g-xl-8">
      <div class="col-xxl-4">
        <div class="card card-xl-stretch mb-5 mb-xl-8">
          <div class="card-header border-0 py-5">
            <h3 class="card-title align-items-start flex-column">
              <span class="card-label fw-bolder text-gray-900 fs-2">Citas</span>
              <span class="text-gray-500 mt-2 fw-semibold fs-6"
                >3 citas atendidas hoy</span
              >
            </h3>
            <div class="card-toolbar">
              <button
                type="button"
                class="btn btn-clean btn-sm btn-icon btn-icon-primary btn-active-light-primary me-n3"
                data-kt-menu-trigger="click"
                data-kt-menu-placement="bottom-end"
              >
                <i class="ki-duotone ki-category fs-2 text-primary">
                  <span class="path1"></span>
                  <span class="path2"></span>
                  <span class="path3"></span>
                  <span class="path4"></span>
                </i>
              </button>
              <div
                class="menu menu-sub menu-sub-dropdown menu-column menu-rounded menu-gray-800 menu-state-bg-light-primary fw-semibold w-200px"
                data-kt-menu="true"
              >
                <div class="menu-item px-3">
                  <div
                    class="menu-content fs-6 text-gray-900 fw-bold px-3 py-4"
                  >
                    Quick Actions
                  </div>
                </div>
                <div class="separator mb-3 opacity-75"></div>
                <div class="menu-item px-3">
                  <a href="#" class="menu-link px-3">New Ticket</a>
                </div>
                <div class="menu-item px-3">
                  <a href="#" class="menu-link px-3">New Customer</a>
                </div>
                <div
                  class="menu-item px-3"
                  data-kt-menu-trigger="hover"
                  data-kt-menu-placement="right-start"
                >
                  <a href="#" class="menu-link px-3">
                    <span class="menu-title">New Group</span>
                    <span class="menu-arrow"></span>
                  </a>
                  <div class="menu-sub menu-sub-dropdown w-175px py-4">
                    <div class="menu-item px-3">
                      <a href="#" class="menu-link px-3">Admin Group</a>
                    </div>
                    <div class="menu-item px-3">
                      <a href="#" class="menu-link px-3">Staff Group</a>
                    </div>
                    <div class="menu-item px-3">
                      <a href="#" class="menu-link px-3">Member Group</a>
                    </div>
                  </div>
                </div>
                <div class="menu-item px-3">
                  <a href="#" class="menu-link px-3">New Contact</a>
                </div>
                <div class="separator mt-3 opacity-75"></div>
                <div class="menu-item px-3">
                  <div class="menu-content px-3 py-3">
                    <a class="btn btn-primary btn-sm px-4" href="#"
                      >Generate Reports</a
                    >
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="card-body d-flex flex-column pt-0">
            <div class="d-flex flex-center position-relative">
              <div id="chart" style="width: 800px">
                <apx-chart
                  [series]="chartOptions.series!"
                  [chart]="chartOptions.chart!"
                  [plotOptions]="chartOptions.plotOptions!"
                  [stroke]="chartOptions.stroke!"
                  [labels]="chartOptions.labels!"
                ></apx-chart>
              </div>
            </div>

            <div class="mt-n20 pb-5 position-relative zindex-1">
              <div
                class="d-flex flex-grow-1 flex-row align-items-center justify-content-between"
              >
                <div class="text-gray-500 mt-0 fw-semibold fs-6 mb-4">
                  Siguientes citas
                </div>
                <div>
                  <a [routerLink]="['/dashboards/appointments']"
                    >Ver Todas
                    <i class="ki-duotone ki-arrow-right">
                      <span class="path1"></span>
                      <span class="path2"></span> </i
                  ></a>
                </div>
              </div>

              @for (item of appointments; track item) {
              <appointment-summary [item]="item" />
              }
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
